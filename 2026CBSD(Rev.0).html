<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>전동기 정기보수 통합 관리</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
  :root{
    --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3450;
    --accent:#3d6fff;--red:#ff4d6d;--green:#06d6a0;--yellow:#ffd166;
    --text:#e8eaf6;--text2:#8b92b8;--text3:#555e8a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

  .header{background:linear-gradient(135deg,#1a1d27,#22263a);border-bottom:1px solid var(--border);padding:16px;position:sticky;top:0;z-index:100}
  .header h1{font-size:18px;font-weight:700;letter-spacing:-0.3px}
  .header p{font-size:11px;color:var(--text2);margin-top:2px}

  /* 메인탭 */
  .main-tabs{display:flex;background:var(--surface);border-bottom:2px solid var(--border);position:sticky;top:65px;z-index:99}
  .main-tab{flex:1;padding:13px 8px;text-align:center;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
  .main-tab.active.motor{color:var(--accent);border-bottom-color:var(--accent);background:rgba(61,111,255,.07)}
  .main-tab.active.task{color:var(--green);border-bottom-color:var(--green);background:rgba(6,214,160,.07)}

  /* 서브탭 */
  .sub-tabs{display:flex;background:var(--surface2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:114px;z-index:98}
  .sub-tabs::-webkit-scrollbar{display:none}
  .sub-tab{flex:1;min-width:70px;padding:10px 6px;text-align:center;font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
  .sub-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

  /* 요약 */
  .summary{display:flex;gap:8px;padding:12px 12px 0;overflow-x:auto;scrollbar-width:none}
  .summary::-webkit-scrollbar{display:none}
  .stat-card{flex:1;min-width:80px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
  .stat-card .num{font-size:22px;font-weight:900}
  .stat-card .lbl{font-size:10px;color:var(--text2);margin-top:2px}
  .stat-card.total .num{color:var(--accent)}
  .stat-card.out .num{color:var(--red)}
  .stat-card.in .num{color:var(--green)}
  .stat-card.done .num{color:var(--green)}
  .stat-card.remain .num{color:var(--yellow)}

  /* 진행률 */
  .progress-wrap{padding:10px 12px 0}
  .progress-bar-bg{background:var(--surface2);border-radius:99px;height:6px;overflow:hidden}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:99px;transition:width .4s}
  .progress-label{font-size:10px;color:var(--text2);margin-top:4px;text-align:right}

  /* 검색 */
  .controls{padding:10px 12px}
  .search-box{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
  .search-box:focus{border-color:var(--accent)}
  .search-box::placeholder{color:var(--text3)}

  .item-list{padding:0 12px 100px}

  /* 전동기 카드 */
  .motor-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
  .motor-card.exported{border-left:3px solid var(--red)}
  .motor-card.imported{border-left:3px solid var(--green)}
  .motor-header{display:flex;align-items:center;padding:12px;gap:10px;cursor:pointer;user-select:none}
  .motor-name{font-size:14px;font-weight:700}
  .motor-sub{font-size:10px;color:var(--text3);margin-top:2px}
  .motor-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
  .badge.out{background:rgba(255,77,109,.15);color:var(--red);border:1px solid rgba(255,77,109,.3)}
  .badge.in{background:rgba(6,214,160,.15);color:var(--green);border:1px solid rgba(6,214,160,.3)}
  .badge.none{background:rgba(139,146,184,.1);color:var(--text2);border:1px solid var(--border)}
  .motor-body{padding:0 12px 12px;border-top:1px solid var(--border);display:none}
  .motor-body.open{display:block}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
  .info-item label{font-size:10px;color:var(--text3);display:block;margin-bottom:3px}
  .info-item input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 9px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
  .info-item input:focus{border-color:var(--accent)}
  .status-info{margin-top:8px;font-size:11px;color:var(--text2);padding:6px 8px;background:var(--surface2);border-radius:6px}
  .status-info span.red{color:var(--red)}
  .status-info span.green{color:var(--green)}
  .action-row{display:flex;gap:8px;margin-top:10px}
  .btn{flex:1;padding:9px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
  .btn-out{background:rgba(255,77,109,.15);color:var(--red);border:1px solid rgba(255,77,109,.3)}
  .btn-out:active{background:rgba(255,77,109,.3)}
  .btn-in{background:rgba(6,214,160,.15);color:var(--green);border:1px solid rgba(6,214,160,.3)}
  .btn-in:active{background:rgba(6,214,160,.3)}
  .btn-save{background:rgba(61,111,255,.15);color:var(--accent);border:1px solid rgba(61,111,255,.3)}
  .btn-reset{background:rgba(139,146,184,.1);color:var(--text2);border:1px solid var(--border)}

  /* 작업 카드 */
  .task-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
  .task-card.completed{opacity:.55;border-left:3px solid var(--green)}
  .task-card.outsource{border-left:3px solid var(--red)}
  .task-card.completed.outsource{border-left:3px solid var(--green)}
  .task-row{display:flex;align-items:center;padding:12px;gap:10px}
  .task-no{font-size:11px;color:var(--text3);font-weight:700;min-width:20px;text-align:center;flex-shrink:0}
  .task-info{flex:1;min-width:0}
  .task-desc{font-size:13px;font-weight:500;line-height:1.4;word-break:keep-all}
  .task-desc.done-text{text-decoration:line-through;color:var(--text3)}
  .task-meta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center}
  .tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
  .tag.out-t{background:rgba(255,77,109,.15);color:var(--red);border:1px solid rgba(255,77,109,.3)}
  .tag.self-t{background:rgba(139,146,184,.1);color:var(--text2);border:1px solid var(--border)}
  .tag.person-t{background:rgba(61,111,255,.1);color:var(--accent);border:1px solid rgba(61,111,255,.2)}
  .tag.done-t{background:rgba(6,214,160,.1);color:var(--green);border:1px solid rgba(6,214,160,.3)}
  .task-actions{display:flex;gap:6px;flex-shrink:0;align-items:center}
  .check-btn{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:transparent;flex-shrink:0;transition:all .2s}
  .check-btn.checked{background:var(--green);border-color:var(--green);color:#fff}
  .del-btn{width:24px;height:24px;border-radius:50%;border:1px solid rgba(255,77,109,.3);background:rgba(255,77,109,.08);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--red);flex-shrink:0}
  .del-btn:active{background:rgba(255,77,109,.3)}

  /* 이력 */
  .history-wrap{padding:12px}
  .date-row{display:flex;gap:8px;align-items:center;margin-bottom:12px}
  .date-row label{font-size:12px;color:var(--text2);white-space:nowrap}
  .date-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
  .date-input:focus{border-color:var(--accent)}
  .hist-group{margin-bottom:14px}
  .hist-title{font-size:11px;font-weight:700;padding:5px 10px;border-radius:6px;margin-bottom:6px}
  .hist-title.out-t{background:rgba(255,77,109,.1);color:var(--red)}
  .hist-title.in-t{background:rgba(6,214,160,.1);color:var(--green)}
  .hist-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
  .hist-name{font-size:13px;font-weight:700}
  .hist-meta{font-size:11px;color:var(--text2);margin-top:2px}
  .hist-time{font-size:11px;color:var(--text3)}

  .group-header{padding:10px 12px 2px;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1px}
  .section{display:none}.section.active{display:block}
  .sub-sec{display:none}.sub-sec.active{display:block}

  /* FAB */
  .fab{position:fixed;bottom:24px;right:20px;width:54px;height:54px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 24px rgba(61,111,255,.45);z-index:200;display:flex;align-items:center;justify-content:center;transition:transform .15s}
  .fab:active{transform:scale(.9)}

  /* 모달 */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:none;align-items:flex-end;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:24px 20px;padding-bottom:calc(24px + env(safe-area-inset-bottom));max-height:85vh;overflow-y:auto}
  .modal-title{font-size:16px;font-weight:700;margin-bottom:4px}
  .modal-sub{font-size:11px;color:var(--text2);margin-bottom:16px}
  .field-label{font-size:11px;color:var(--text3);display:block;margin-bottom:5px;margin-top:14px;font-weight:500}
  .modal input,.modal textarea,.modal select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:13px;font-family:inherit;outline:none;resize:none;-webkit-appearance:none}
  .modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--accent)}
  .modal-btns{display:flex;gap:8px;margin-top:18px}
  .modal-btn{flex:1;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .modal-btn.cancel{background:var(--surface2);color:var(--text2)}
  .modal-btn.confirm{background:var(--accent);color:#fff}

  .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:400;display:none;align-items:center;justify-content:center;padding:20px}
  .confirm-overlay.open{display:flex}
  .confirm-box{background:var(--surface);border-radius:18px;padding:22px 20px;width:100%;max-width:320px}
  .confirm-title{font-size:15px;font-weight:700;margin-bottom:8px}
  .confirm-desc{font-size:12px;margin-bottom:20px;background:var(--surface2);padding:10px 12px;border-radius:8px;color:var(--text);font-weight:700;line-height:1.5}
  .confirm-btns{display:flex;gap:8px}
  .confirm-btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .confirm-btn.cancel{background:var(--surface2);color:var(--text2)}
  .confirm-btn.del{background:rgba(255,77,109,.15);color:var(--red);border:1px solid rgba(255,77,109,.3)}

  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:10px 20px;font-size:12px;color:var(--text);opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .empty-msg{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
</style>
</head>
<body>

<div class="header">
  <h1>⚙️ 전동기 정기보수 통합 관리</h1>
  <p>U-1,3 · U-2 · U-5 구역</p>
</div>

<div class="main-tabs">
  <div class="main-tab motor active" onclick="switchMain('motor')">⚙️ 전동기 관리</div>
  <div class="main-tab task"         onclick="switchMain('task')">📋 작업리스트</div>
</div>

<!-- 전동기 관리 -->
<div id="sec-motor" class="section active">
  <div class="sub-tabs" id="motor-sub-tabs">
    <div class="sub-tab active" onclick="switchMotorSub('mall')">전체</div>
    <div class="sub-tab"        onclick="switchMotorSub('mu13')">U-1,3</div>
    <div class="sub-tab"        onclick="switchMotorSub('mu2')">U-2</div>
    <div class="sub-tab"        onclick="switchMotorSub('mu5')">U-5</div>
    <div class="sub-tab"        onclick="switchMotorSub('mhist')">반출입 이력</div>
  </div>
  <div id="msub-mall" class="sub-sec active">
    <div class="summary" id="msummary-mall"></div>
    <div class="controls"><input class="search-box" type="text" placeholder="🔍 전동기 검색..." oninput="filterMotors('mall',this.value)"></div>
    <div class="item-list" id="mlist-mall"></div>
  </div>
  <div id="msub-mu13" class="sub-sec">
    <div class="summary" id="msummary-mu13"></div>
    <div class="controls"><input class="search-box" type="text" placeholder="🔍 전동기 검색..." oninput="filterMotors('mu13',this.value)"></div>
    <div class="item-list" id="mlist-mu13"></div>
  </div>
  <div id="msub-mu2" class="sub-sec">
    <div class="summary" id="msummary-mu2"></div>
    <div class="controls"><input class="search-box" type="text" placeholder="🔍 전동기 검색..." oninput="filterMotors('mu2',this.value)"></div>
    <div class="item-list" id="mlist-mu2"></div>
  </div>
  <div id="msub-mu5" class="sub-sec">
    <div class="summary" id="msummary-mu5"></div>
    <div class="controls"><input class="search-box" type="text" placeholder="🔍 전동기 검색..." oninput="filterMotors('mu5',this.value)"></div>
    <div class="item-list" id="mlist-mu5"></div>
  </div>
  <div id="msub-mhist" class="sub-sec">
    <div class="history-wrap">
      <div class="date-row"><label>날짜 선택</label>
        <input type="date" class="date-input" id="mHistDate" onchange="renderMotorHist()">
      </div>
      <div id="mHistContent"></div>
    </div>
  </div>
</div>

<!-- 작업리스트 -->
<div id="sec-task" class="section">
  <div class="sub-tabs" id="task-sub-tabs">
    <div class="sub-tab active" onclick="switchTaskSub('tall')">전체</div>
    <div class="sub-tab"        onclick="switchTaskSub('tu13')">U-1,3</div>
    <div class="sub-tab"        onclick="switchTaskSub('tu2')">U-2</div>
    <div class="sub-tab"        onclick="switchTaskSub('tu5')">U-5</div>
  </div>
  <div id="tsub-tall" class="sub-sec active">
    <div class="summary" id="tsummary-tall"></div>
    <div class="progress-wrap" id="tprogress-tall"></div>
    <div class="item-list" id="tlist-tall"></div>
  </div>
  <div id="tsub-tu13" class="sub-sec">
    <div class="summary" id="tsummary-tu13"></div>
    <div class="progress-wrap" id="tprogress-tu13"></div>
    <div class="item-list" id="tlist-tu13"></div>
  </div>
  <div id="tsub-tu2" class="sub-sec">
    <div class="summary" id="tsummary-tu2"></div>
    <div class="progress-wrap" id="tprogress-tu2"></div>
    <div class="item-list" id="tlist-tu2"></div>
  </div>
  <div id="tsub-tu5" class="sub-sec">
    <div class="summary" id="tsummary-tu5"></div>
    <div class="progress-wrap" id="tprogress-tu5"></div>
    <div class="item-list" id="tlist-tu5"></div>
  </div>
</div>

<button class="fab" onclick="openModal()">＋</button>

<!-- 추가 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">추가</div>
    <div class="modal-sub" id="modalSub"></div>
    <div id="fld-motor">
      <label class="field-label">구역</label>
      <select id="m-region"><option value="U-1,3">U-1,3</option><option value="U-2">U-2</option><option value="U-5">U-5</option></select>
      <label class="field-label">전동기 이름 (ITEM NO)</label>
      <input type="text" id="m-name" placeholder="예) P-001A">
      <label class="field-label">용량 (kW)</label>
      <input type="text" id="m-kw" placeholder="예) 37">
      <label class="field-label">위치</label>
      <input type="text" id="m-loc" placeholder="예) 드라이어 하부">
    </div>
    <div id="fld-task" style="display:none">
      <label class="field-label">구역</label>
      <select id="t-region"><option value="U-1,3">U-1,3</option><option value="U-2">U-2</option><option value="U-5">U-5</option></select>
      <label class="field-label">작업 내용</label>
      <textarea id="t-desc" rows="3" placeholder="작업 내용을 입력하세요"></textarea>
      <label class="field-label">수리 구분</label>
      <select id="t-type"><option value="자체">자체</option><option value="외주">외주</option></select>
      <label class="field-label">담당자</label>
      <input type="text" id="t-person" placeholder="예) 박병근">
    </div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn confirm" onclick="addItem()">추가하기</button>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirmTitle">삭제</div>
    <div class="confirm-desc" id="confirmDesc"></div>
    <div class="confirm-btns">
      <button class="confirm-btn cancel" onclick="closeConfirm()">취소</button>
      <button class="confirm-btn del" onclick="doDelete()">삭제</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ 초기 데이터 ══════════════════════════════════════
const INIT_MOTORS = [
  {id:'u13-1',region:'U-1,3',name:'CV-405',kw:'15',location:'펠레트빌딩 3층',status:'none',exportDate:'',importDate:''},
  {id:'u13-2',region:'U-1,3',name:'FN-313',kw:'37',location:'드라이어 하부',status:'none',exportDate:'',importDate:''},
  {id:'u13-3',region:'U-1,3',name:'FN-315',kw:'550',location:'TREAD TAIL GAS DRAFT FAN',status:'none',exportDate:'',importDate:''},
  {id:'u13-4',region:'U-1,3',name:'FN-503',kw:'37',location:'F-501 상부',status:'none',exportDate:'',importDate:''},
  {id:'u13-5',region:'U-1,3',name:'FN-506A',kw:'45',location:'드라이어 하부 안쪽',status:'none',exportDate:'',importDate:''},
  {id:'u13-6',region:'U-1,3',name:'FN-506B',kw:'45',location:'드라이어 하부 바깥쪽',status:'none',exportDate:'',importDate:''},
  {id:'u13-7',region:'U-1,3',name:'ML-301',kw:'55',location:'펠레트빌딩 2층',status:'none',exportDate:'',importDate:''},
  {id:'u13-8',region:'U-1,3',name:'P-001A',kw:'55',location:'',status:'none',exportDate:'',importDate:''},
  {id:'u13-9',region:'U-1,3',name:'P-003',kw:'19',location:'',status:'none',exportDate:'',importDate:''},
  {id:'u13-10',region:'U-1,3',name:'P-009',kw:'55',location:'',status:'none',exportDate:'',importDate:''},
  {id:'u13-11',region:'U-1,3',name:'P-101B',kw:'',location:'',status:'none',exportDate:'',importDate:''},
  {id:'u13-12',region:'U-1,3',name:'P-103A',kw:'45',location:'',status:'none',exportDate:'',importDate:''},
  {id:'u13-13',region:'U-1,3',name:'P-103B',kw:'37',location:'',status:'none',exportDate:'',importDate:''},
  {id:'u13-14',region:'U-1,3',name:'P-113',kw:'1.5',location:'',status:'none',exportDate:'',importDate:''},

function mRegionOf(s){return{mu13:'U-1,3',mu2:'U-2',mu5:'U-5'}[s];}
function tRegionOf(s){return{tu13:'U-1,3',tu2:'U-2',tu5:'U-5'}[s];}

// ══ 메인탭 ════════════════════════════════════════════
function switchMain(tab){
  curMain=tab;
  document.querySelectorAll('.main-tab').forEach(el=>el.classList.remove('active'));
  document.querySelector('.main-tab.'+tab).classList.add('active');
  document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
  if(tab==='motor') renderAllMotor();
  else renderAllTask();
}

// ══ 전동기 ════════════════════════════════════════════
function switchMotorSub(sub){
  curMotorSub=sub;
  document.querySelectorAll('#motor-sub-tabs .sub-tab').forEach((el,i)=>
    el.classList.toggle('active',['mall','mu13','mu2','mu5','mhist'][i]===sub));
  document.querySelectorAll('#sec-motor .sub-sec').forEach(el=>el.classList.remove('active'));
  document.getElementById('msub-'+sub).classList.add('active');
  if(sub==='mhist'){
    if(!document.getElementById('mHistDate').value)
      document.getElementById('mHistDate').value=today();
    renderMotorHist();
  } else renderMotorSub(sub);
}

function getMotorList(sub){
  const list=sub==='mall'?[...motors]:motors.filter(m=>m.region===mRegionOf(sub));
  return list.sort((a,b)=>a.name.localeCompare(b.name));
}

function renderAllMotor(){
  ['mall','mu13','mu2','mu5'].forEach(s=>renderMotorSub(s));
}

function renderMotorSub(sub){
  const list=getMotorList(sub);
  const el=document.getElementById('msummary-'+sub); if(!el) return;
  const exp=list.filter(m=>m.status==='exported').length;
  const imp=list.filter(m=>m.status==='imported').length;
  el.innerHTML=`
    <div class="stat-card total"><div class="num">${list.length}</div><div class="lbl">전체</div></div>
    <div class="stat-card out"><div class="num">${exp}</div><div class="lbl">반출중</div></div>
    <div class="stat-card in"><div class="num">${imp}</div><div class="lbl">수리완료</div></div>`;
  renderMotorList(sub,'');
}

function filterMotors(sub,q){renderMotorList(sub,q);}

function renderMotorList(sub,query){
  const el=document.getElementById('mlist-'+sub); if(!el) return;
  let list=getMotorList(sub);
  if(query){const q=query.toLowerCase();list=list.filter(m=>m.name.toLowerCase().includes(q)||(m.location||'').toLowerCase().includes(q));}
  if(!list.length){el.innerHTML='<div class="empty-msg">검색 결과가 없습니다</div>';return;}
  if(sub==='mall'){
    el.innerHTML=['U-1,3','U-2','U-5'].map(r=>{
      const rl=list.filter(m=>m.region===r);
      return rl.length?`<div class="group-header">${r}</div>`+rl.map(m=>buildMotorCard(m,sub)).join(''):'';
    }).join('');
  } else {
    el.innerHTML=list.map(m=>buildMotorCard(m,sub)).join('');
  }
}

function buildMotorCard(m,sub){
  const uid=sub+'__'+m.id;
  const cls=m.status==='exported'?'exported':m.status==='imported'?'imported':'';
  const bCls=m.status==='exported'?'out':m.status==='imported'?'in':'none';
  const bTxt=m.status==='exported'?'반출':m.status==='imported'?'수리완료':'정상';
  let si='';
  if(m.status==='exported'&&m.exportDate) si=`<div class="status-info">반출일: <span class="red">${m.exportDate}</span></div>`;
  else if(m.status==='imported'&&m.importDate) si=`<div class="status-info">반입일: <span class="green">${m.importDate}</span> · 수리완료</div>`;
  return `
<div class="motor-card ${cls}" id="mc-${uid}">
  <div class="motor-header" onclick="toggleMotorCard('${uid}')">
    <div style="flex:1;min-width:0">
      <div class="motor-name">${m.name}</div>
      <div class="motor-sub">${m.region}${m.kw?' · '+m.kw+'kW':''}${m.location?' · '+m.location:''}</div>
    </div>
    <div class="motor-right">
      <button class="del-btn" onclick="event.stopPropagation();confirmDel('motor','${m.id}','${m.name}')">✕</button>
      <span class="badge ${bCls}">${bTxt}</span>
    </div>
  </div>
  <div class="motor-body" id="mb-${uid}">
    <div class="info-grid">
      <div class="info-item"><label>용량 (kW)</label><input type="text" id="mkw-${uid}" value="${m.kw||''}" placeholder="kW"></div>
      <div class="info-item"><label>위치</label><input type="text" id="mloc-${uid}" value="${m.location||''}" placeholder="위치"></div>
    </div>
    ${si}
    <div class="action-row">
      <button class="btn btn-out"  onclick="setMotorStatus('${m.id}','${sub}','exported')">📤 반출</button>
      <button class="btn btn-in"   onclick="setMotorStatus('${m.id}','${sub}','imported')">📥 반입</button>
      <button class="btn btn-save" onclick="saveMotorCard('${m.id}','${uid}')">💾 저장</button>
      <button class="btn btn-reset"onclick="setMotorStatus('${m.id}','${sub}','none')">↩</button>
    </div>
  </div>
</div>`;
}

function toggleMotorCard(uid){document.getElementById('mb-'+uid)?.classList.toggle('open');}

function saveMotorCard(mid,uid){
  const m=motors.find(x=>x.id===mid); if(!m) return;
  m.kw=document.getElementById('mkw-'+uid)?.value||'';
  m.location=document.getElementById('mloc-'+uid)?.value||'';
  saveMotors(); showToast('✅ 저장되었습니다');
  refreshCard(uid,mid);
}

function setMotorStatus(mid,sub,status){
  const m=motors.find(x=>x.id===mid); if(!m) return;
  if(status==='exported'){
    if(m.status==='exported'){showToast('이미 반출된 전동기입니다');return;}
    m.status='exported';m.exportDate=today();m.importDate='';
    mHist.push({name:m.name,region:m.region,kw:m.kw||'',location:m.location||'',action:'exported',date:today(),time:nowTime()});
    showToast('📤 반출 처리되었습니다');
  }else if(status==='imported'){
    if(m.status==='imported'){showToast('이미 수리완료된 전동기입니다');return;}
    m.status='imported';m.importDate=today();
    mHist.push({name:m.name,region:m.region,kw:m.kw||'',location:m.location||'',action:'imported',date:today(),time:nowTime()});
    showToast('📥 반입(수리완료) 처리되었습니다');
  }else{
    m.status='none';m.exportDate='';m.importDate='';
    showToast('↩ 초기화되었습니다');
  }
  saveMotors();saveMHist();
  const uid=sub+'__'+mid;
  refreshCard(uid,mid);
}

function refreshCard(uid,mid){
  const sub=uid.split('__')[0];
  const m=motors.find(x=>x.id===mid); if(!m) return;
  const card=document.getElementById('mc-'+uid);
  if(card){
    const wasOpen=document.getElementById('mb-'+uid)?.classList.contains('open');
    const d=document.createElement('div');
    d.innerHTML=buildMotorCard(m,sub);
    card.replaceWith(d.firstElementChild);
    if(wasOpen) document.getElementById('mb-'+uid)?.classList.add('open');
  }
  ['mall','mu13','mu2','mu5'].forEach(s=>renderMotorSub(s));
}

function renderMotorHist(){
  const date=document.getElementById('mHistDate').value;
  const el=document.getElementById('mHistContent'); if(!date||!el) return;
  const day=mHist.filter(h=>h.date===date);
  const outs=day.filter(h=>h.action==='exported');
  const ins=day.filter(h=>h.action==='imported');
  if(!day.length){el.innerHTML=`<div class="empty-msg">${date}<br>이력이 없습니다</div>`;return;}
  const row=h=>`<div class="hist-item"><div><div class="hist-name">${h.name}</div><div class="hist-meta">${h.region}${h.kw?' · '+h.kw+'kW':''}${h.location?' · '+h.location:''}</div></div><div class="hist-time">${h.time||''}</div></div>`;
  let html='';
  if(outs.length) html+=`<div class="hist-group"><div class="hist-title out-t">📤 반출 (${outs.length}건)</div>${outs.map(row).join('')}</div>`;
  if(ins.length)  html+=`<div class="hist-group"><div class="hist-title in-t">📥 반입·수리완료 (${ins.length}건)</div>${ins.map(row).join('')}</div>`;
  el.innerHTML=html;
}

// ══ 작업리스트 ════════════════════════════════════════
function switchTaskSub(sub){
  curTaskSub=sub;
  document.querySelectorAll('#task-sub-tabs .sub-tab').forEach((el,i)=>
    el.classList.toggle('active',['tall','tu13','tu2','tu5'][i]===sub));
  document.querySelectorAll('#sec-task .sub-sec').forEach(el=>el.classList.remove('active'));
  document.getElementById('tsub-'+sub).classList.add('active');
  renderTaskSub(sub);
}

function getTaskList(sub){
  return sub==='tall'?tasks:tasks.filter(t=>t.region===tRegionOf(sub));
}

function renderAllTask(){
  ['tall','tu13','tu2','tu5'].forEach(s=>renderTaskSub(s));
}

function renderTaskSub(sub){
  const list=getTaskList(sub);
  const done=list.filter(t=>t.done).length;
  const el=document.getElementById('tsummary-'+sub); if(!el) return;
  el.innerHTML=`
    <div class="stat-card total"><div class="num">${list.length}</div><div class="lbl">전체</div></div>
    <div class="stat-card done"><div class="num">${done}</div><div class="lbl">완료</div></div>
    <div class="stat-card remain"><div class="num">${list.length-done}</div><div class="lbl">미완료</div></div>`;
  const pel=document.getElementById('tprogress-'+sub);
  if(pel){
    const pct=list.length?Math.round(done/list.length*100):0;
    pel.innerHTML=`<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div><div class="progress-label">${pct}% 완료</div>`;
  }
  const lel=document.getElementById('tlist-'+sub); if(!lel) return;
  if(!list.length){lel.innerHTML='<div class="empty-msg">등록된 작업이 없습니다</div>';return;}
  if(sub==='tall'){
    lel.innerHTML=['U-1,3','U-2','U-5'].map(r=>{
      const rl=list.filter(t=>t.region===r);
      const labels={'U-1,3':'U-1,3 (담당: 박병근)','U-2':'U-2 (담당: 장지훈)','U-5':'U-5'};
      return rl.length?`<div class="group-header">${labels[r]}</div>`+rl.map(t=>buildTaskCard(t,sub)).join(''):'';
    }).join('');
  }else{
    lel.innerHTML=list.map(t=>buildTaskCard(t,sub)).join('');
  }
}

function buildTaskCard(t,sub){
  const uid=sub+'__'+t.id;
  const isOut=t.type==='외주';
  return `
<div class="task-card ${t.done?'completed':''} ${isOut&&!t.done?'outsource':''}" id="tc-${uid}">
  <div class="task-row">
    <div class="task-no">${t.no}</div>
    <div class="task-info">
      <div class="task-desc ${t.done?'done-text':''}">${t.desc}</div>
      <div class="task-meta">
        <span class="tag ${isOut?'out-t':'self-t'}">${t.type}</span>
        <span class="tag person-t">👤 ${t.person}</span>
        ${t.done?'<span class="tag done-t">✅ 완료</span>':''}
      </div>
    </div>
    <div class="task-actions">
      <button class="del-btn" onclick="confirmDel('task','${t.id}','${t.desc.slice(0,25)}')">✕</button>
      <button class="check-btn ${t.done?'checked':''}" onclick="toggleDone('${t.id}')">✓</button>
    </div>
  </div>
</div>`;
}

function toggleDone(tid){
  const t=tasks.find(x=>x.id===tid); if(!t) return;
  t.done=!t.done; saveTasks();
  showToast(t.done?'✅ 완료 처리되었습니다':'↩ 완료 취소되었습니다');
  renderAllTask();
}

// ══ 추가 모달 ════════════════════════════════════════
function openModal(){
  const isMotor=curMain==='motor';
  document.getElementById('fld-motor').style.display=isMotor?'block':'none';
  document.getElementById('fld-task').style.display=isMotor?'none':'block';
  if(isMotor){
    document.getElementById('modalTitle').textContent='⚙️ 전동기 추가';
    document.getElementById('modalSub').textContent='새 전동기를 등록합니다';
    if(curMotorSub!=='mall'&&curMotorSub!=='mhist')
      document.getElementById('m-region').value=mRegionOf(curMotorSub);
    document.getElementById('m-name').value='';
    document.getElementById('m-kw').value='';
    document.getElementById('m-loc').value='';
  }else{
    document.getElementById('modalTitle').textContent='📋 작업 추가';
    document.getElementById('modalSub').textContent='정기보수 작업을 추가합니다';
    if(curTaskSub!=='tall')
      document.getElementById('t-region').value=tRegionOf(curTaskSub);
    document.getElementById('t-desc').value='';
    document.getElementById('t-type').value='자체';
    document.getElementById('t-person').value='';
  }
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function closeModalOutside(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}

function addItem(){
  if(curMain==='motor'){
    const region=document.getElementById('m-region').value;
    const name=document.getElementById('m-name').value.trim().toUpperCase();
    const kw=document.getElementById('m-kw').value.trim();
    const loc=document.getElementById('m-loc').value.trim();
    if(!name){showToast('⚠️ 전동기 이름을 입력하세요');return;}
    if(motors.find(m=>m.name===name&&m.region===region)){showToast('⚠️ 이미 존재합니다');return;}
    motors.push({id:'cm'+Date.now(),region,name,kw,location:loc,status:'none',exportDate:'',importDate:''});
    saveMotors();closeModal();showToast('➕ 전동기가 추가되었습니다');
    renderAllMotor();
  }else{
    const region=document.getElementById('t-region').value;
    const desc=document.getElementById('t-desc').value.trim();
    const type=document.getElementById('t-type').value;
    const person=document.getElementById('t-person').value.trim();
    if(!desc){showToast('⚠️ 작업 내용을 입력하세요');return;}
    if(!person){showToast('⚠️ 담당자를 입력하세요');return;}
    const rt=tasks.filter(t=>t.region===region);
    const maxNo=rt.length?Math.max(...rt.map(t=>t.no)):0;
    tasks.push({id:'ct'+Date.now(),region,no:maxNo+1,type,person,desc,done:false});
    saveTasks();closeModal();showToast('➕ 작업이 추가되었습니다');
    renderAllTask();
  }
}

// ══ 삭제 ═════════════════════════════════════════════
function confirmDel(type,id,label){
  pendingDel={type,id};
  document.getElementById('confirmTitle').textContent=type==='motor'?'🗑️ 전동기 삭제':'🗑️ 작업 삭제';
  document.getElementById('confirmDesc').textContent=label;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm(){pendingDel=null;document.getElementById('confirmOverlay').classList.remove('open');}
function doDelete(){
  if(!pendingDel) return;
  const {type,id}=pendingDel;
  if(type==='motor'){
    motors=motors.filter(m=>m.id!==id);
    saveMotors();closeConfirm();showToast('🗑️ 전동기가 삭제되었습니다');
    renderAllMotor();
  }else{
    const del=tasks.find(t=>t.id===id);
    tasks=tasks.filter(t=>t.id!==id);
    if(del){let i=1;tasks.filter(t=>t.region===del.region).forEach(t=>{t.no=i++;});}
    saveTasks();closeConfirm();showToast('🗑️ 작업이 삭제되었습니다');
    renderAllTask();
  }
}

// ══ 토스트 ═══════════════════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ── 초기화 ────────────────────────────────────────────
renderAllMotor();
document.getElementById('mHistDate').value=today();
</script>
</body>
</html>
