<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>작업 일지</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
  :root{
    --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3450;
    --accent:#3d6fff;--red:#ff4d6d;--green:#06d6a0;--yellow:#ffd166;--orange:#f4a261;
    --text:#e8eaf6;--text2:#8b92b8;--text3:#555e8a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

  /* 헤더 */
  .header{background:linear-gradient(135deg,#1a1d27,#22263a);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:100}
  .header h1{font-size:17px;font-weight:700}
  .header-sub{display:flex;align-items:center;gap:8px;margin-top:6px}
  .today-badge{font-size:12px;color:var(--accent);font-weight:700;background:rgba(61,111,255,.12);padding:3px 10px;border-radius:20px;border:1px solid rgba(61,111,255,.25)}

  /* 탭 */
  .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:65px;z-index:99}
  .tab{flex:1;padding:12px 8px;text-align:center;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(61,111,255,.07)}

  /* 날짜 섹션 */
  .date-bar{display:flex;align-items:center;gap:8px;padding:12px}
  .date-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
  .date-input:focus{border-color:var(--accent)}
  .today-btn{padding:9px 14px;background:rgba(61,111,255,.15);color:var(--accent);border:1px solid rgba(61,111,255,.3);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}

  /* 통계 */
  .stat-row{display:flex;gap:8px;padding:0 12px 10px}
  .stat-chip{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center}
  .stat-chip .n{font-size:20px;font-weight:900}
  .stat-chip .l{font-size:10px;color:var(--text2);margin-top:1px}
  .stat-chip.total .n{color:var(--accent)}
  .stat-chip.done .n{color:var(--green)}
  .stat-chip.pending .n{color:var(--yellow)}

  /* 작업 카드 */
  .work-list{padding:0 12px 100px}
  .work-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
  .work-card.done-card{border-left:3px solid var(--green);opacity:.7}
  .work-card.has-note{border-right:3px solid var(--orange)}

  .card-header{display:flex;align-items:flex-start;padding:12px;gap:10px;cursor:pointer;user-select:none}
  .card-main{flex:1;min-width:0}
  .card-desc{font-size:13px;font-weight:600;line-height:1.4;word-break:keep-all}
  .card-desc.striked{text-decoration:line-through;color:var(--text3)}
  .card-tags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
  .chip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
  .chip.dept{background:rgba(61,111,255,.12);color:var(--accent);border:1px solid rgba(61,111,255,.2)}
  .chip.tag{background:rgba(139,146,184,.1);color:var(--text2);border:1px solid var(--border)}
  .chip.done-chip{background:rgba(6,214,160,.12);color:var(--green);border:1px solid rgba(6,214,160,.2)}
  .chip.time{background:rgba(244,162,97,.1);color:var(--orange);border:1px solid rgba(244,162,97,.2)}
  .card-note-preview{font-size:10px;color:var(--red);margin-top:4px;font-weight:600}
  .card-right{display:flex;gap:6px;align-items:center;flex-shrink:0}
  .done-btn{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent;transition:all .2s}
  .done-btn.checked{background:var(--green);border-color:var(--green);color:#fff}
  .del-btn{width:24px;height:24px;border-radius:50%;border:1px solid rgba(255,77,109,.3);background:rgba(255,77,109,.08);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--red)}

  /* 카드 펼치기 */
  .card-body{padding:0 12px 12px;border-top:1px solid var(--border);display:none}
  .card-body.open{display:block}
  .edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
  .edit-item label{font-size:10px;color:var(--text3);display:block;margin-bottom:3px}
  .edit-item input,.edit-item textarea,.edit-item select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 9px;color:var(--text);font-size:13px;font-family:inherit;outline:none;resize:none;-webkit-appearance:none}
  .edit-item input:focus,.edit-item textarea:focus,.edit-item select:focus{border-color:var(--accent)}
  .edit-item.full{grid-column:1/-1}
  .note-inp{border-color:rgba(244,162,97,.4)!important;background:rgba(244,162,97,.05)!important}
  .note-inp:focus{border-color:var(--orange)!important}
  .save-btn{width:100%;padding:10px;background:rgba(61,111,255,.15);color:var(--accent);border:1px solid rgba(61,111,255,.3);border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px}

  /* 검색 탭 */
  .search-wrap{padding:12px}
  .search-input-row{display:flex;gap:8px;margin-bottom:12px}
  .search-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
  .search-input:focus{border-color:var(--accent)}
  .search-btn{padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}

  .search-result-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
  .sri-date{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:5px}
  .sri-desc{font-size:13px;font-weight:600;line-height:1.4;word-break:keep-all}
  .sri-desc mark{background:rgba(255,211,102,.25);color:var(--yellow);border-radius:3px;padding:0 2px}
  .sri-meta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
  .sri-done{border-left:3px solid var(--green)}
  .sri-pending{border-left:3px solid var(--yellow)}

  /* FAB */
  .fab{position:fixed;bottom:24px;right:20px;width:54px;height:54px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 24px rgba(61,111,255,.45);z-index:200;display:flex;align-items:center;justify-content:center;transition:transform .15s}
  .fab:active{transform:scale(.9)}

  /* 모달 */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:none;align-items:flex-end;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:24px 20px;padding-bottom:calc(24px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto}
  .modal-title{font-size:16px;font-weight:700;margin-bottom:4px}
  .modal-sub{font-size:11px;color:var(--text2);margin-bottom:14px}
  .field-label{font-size:11px;color:var(--text3);display:block;margin-bottom:5px;margin-top:14px;font-weight:500}
  .modal input,.modal textarea,.modal select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:13px;font-family:inherit;outline:none;resize:none;-webkit-appearance:none}
  .modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--accent)}
  .modal-btns{display:flex;gap:8px;margin-top:18px}
  .modal-btn{flex:1;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .modal-btn.cancel{background:var(--surface2);color:var(--text2)}
  .modal-btn.confirm{background:var(--accent);color:#fff}

  .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:400;display:none;align-items:center;justify-content:center;padding:20px}
  .confirm-overlay.open{display:flex}
  .confirm-box{background:var(--surface);border-radius:18px;padding:22px 20px;width:100%;max-width:300px}
  .confirm-box p{font-size:14px;font-weight:700;margin-bottom:8px}
  .confirm-box small{font-size:12px;color:var(--text2);display:block;margin-bottom:18px;line-height:1.5}
  .confirm-btns{display:flex;gap:8px}
  .cbtn{flex:1;padding:11px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer}
  .cbtn.cancel{background:var(--surface2);color:var(--text2)}
  .cbtn.del{background:rgba(255,77,109,.15);color:var(--red);border:1px solid rgba(255,77,109,.3)}

  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:10px 20px;font-size:12px;color:var(--text);opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .empty{text-align:center;padding:50px 20px;color:var(--text3);font-size:13px}
  .empty .ico{font-size:36px;margin-bottom:10px}
  .section{display:none}.section.active{display:block}
</style>
</head>
<body>

<div class="header">
  <h1>📋 작업 일지</h1>
  <div class="header-sub">
    <span class="today-badge" id="todayBadge"></span>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('log')">📅 일별 조회</div>
  <div class="tab"        onclick="switchTab('search')">🔍 키워드 검색</div>
</div>

<!-- 일별 조회 -->
<div id="sec-log" class="section active">
  <div class="date-bar">
    <input type="date" class="date-input" id="dateInput" onchange="renderLog()">
    <button class="today-btn" onclick="goToday()">오늘</button>
  </div>
  <div class="stat-row" id="statRow"></div>
  <div class="work-list" id="workList"></div>
</div>

<!-- 키워드 검색 -->
<div id="sec-search" class="section">
  <div class="search-wrap">
    <div class="search-input-row">
      <input type="text" class="search-input" id="searchInput" placeholder="장비명, 작업내용, 생산과 검색..." onkeydown="if(event.key==='Enter')doSearch()">
      <button class="search-btn" onclick="doSearch()">검색</button>
    </div>
    <div id="searchResult"></div>
  </div>
</div>

<button class="fab" onclick="openAddModal()">＋</button>

<!-- 작업 추가 모달 -->
<div class="modal-overlay" id="addModal" onclick="if(event.target===this)closeAddModal()">
  <div class="modal">
    <div class="modal-title">➕ 작업 등록</div>
    <div class="modal-sub">워크오더 내용을 입력합니다</div>
    <label class="field-label">작업 내용 *</label>
    <textarea id="a_desc" rows="3" placeholder="작업 내용을 입력하세요"></textarea>
    <label class="field-label">장비 태그 (TAG No.)</label>
    <input type="text" id="a_tag" placeholder="예) P-101A, FV-210">
    <label class="field-label">생산과 / 요청부서</label>
    <input type="text" id="a_dept" placeholder="예) 카본생산1과">
    <label class="field-label">⚠️ 특이사항</label>
    <textarea id="a_note" rows="2" placeholder="특이사항 입력 (선택)"></textarea>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeAddModal()">취소</button>
      <button class="modal-btn confirm" onclick="addWork()">등록</button>
    </div>
  </div>
</div>

<!-- 삭제 확인 -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p>🗑️ 작업 삭제</p>
    <small id="confirmDesc"></small>
    <div class="confirm-btns">
      <button class="cbtn cancel" onclick="closeConfirm()">취소</button>
      <button class="cbtn del"    onclick="doDelete()">삭제</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 저장/불러오기 ─────────────────────────────────────
function LS(k){try{const s=localStorage.getItem(k);if(s)return JSON.parse(s);}catch(e){}return null;}
function SS(k,v){localStorage.setItem(k,JSON.stringify(v));}

// works: { 'YYYY-MM-DD': [ {id, desc, tag, dept, endtime, note, done}, ... ] }
let works = LS('worklog_v1') || {};
let pendingDel = null;
let curTab = 'log';

// ── 날짜 유틸 ─────────────────────────────────────────
function kstToday(){
  const d = new Date(new Date().getTime() + 9*60*60*1000);
  return d.toISOString().split('T')[0];
}
function fmtDate(s){
  if(!s) return '';
  const [y,m,d] = s.split('-');
  const days = ['일','월','화','수','목','금','토'];
  const day = days[new Date(s).getDay()];
  return `${y}년 ${m}월 ${d}일 (${day})`;
}

// ── 탭 ────────────────────────────────────────────────
function switchTab(tab){
  curTab = tab;
  document.querySelectorAll('.tab').forEach((el,i)=>
    el.classList.toggle('active',['log','search'][i]===tab));
  document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
}

// ── 일별 조회 렌더 ────────────────────────────────────
function goToday(){
  document.getElementById('dateInput').value = kstToday();
  renderLog();
}

function renderLog(){
  const date = document.getElementById('dateInput').value;
  if(!date) return;
  document.getElementById('todayBadge').textContent = fmtDate(date);

  const list = works[date] || [];
  const done = list.filter(w=>w.done).length;
  const pending = list.length - done;

  // 통계
  document.getElementById('statRow').innerHTML = `
    <div class="stat-chip total"><div class="n">${list.length}</div><div class="l">전체</div></div>
    <div class="stat-chip done"><div class="n">${done}</div><div class="l">완료</div></div>
    <div class="stat-chip pending"><div class="n">${pending}</div><div class="l">미완료</div></div>`;

  // 리스트
  const el = document.getElementById('workList');
  if(!list.length){
    el.innerHTML=`<div class="empty"><div class="ico">📝</div>등록된 작업이 없습니다<br><br><span style="color:var(--accent);font-size:12px">+ 버튼으로 작업을 추가하세요</span></div>`;
    return;
  }
  el.innerHTML = list.map(w => workCard(w, date)).join('');
}

function workCard(w, date){
  const hasNote = !!(w.note && w.note.trim());
  return `
<div class="work-card ${w.done?'done-card':''} ${hasNote?'has-note':''}" id="wc_${w.id}">
  <div class="card-header" onclick="toggleBody('wb_${w.id}')">
    <div class="card-main">
      <div class="card-desc ${w.done?'striked':''}">${w.desc}</div>
      <div class="card-tags">
        ${w.dept?`<span class="chip dept">🏭 ${w.dept}</span>`:''}
        ${w.tag?`<span class="chip tag">🔧 ${w.tag}</span>`:''}
        ${w.endtime?`<span class="chip time">✅ ${w.endtime} 완료</span>`:''}
        ${w.done&&!w.endtime?`<span class="chip done-chip">완료</span>`:''}
      </div>
      ${hasNote?`<div class="card-note-preview">⚠️ ${w.note}</div>`:''}
    </div>
    <div class="card-right">
      <button class="del-btn" onclick="event.stopPropagation();confirmDel('${date}','${w.id}','${esc(w.desc.slice(0,30))}')">✕</button>
      <button class="done-btn ${w.done?'checked':''}" onclick="event.stopPropagation();toggleDone('${date}','${w.id}')">✓</button>
    </div>
  </div>
  <div class="card-body" id="wb_${w.id}">
    <div class="edit-grid">
      <div class="edit-item full"><label>작업 내용</label>
        <textarea id="ed_${w.id}" rows="3">${esc(w.desc)}</textarea></div>
      <div class="edit-item"><label>장비 태그</label>
        <input id="et_${w.id}" value="${esc(w.tag||'')}" placeholder="TAG No."></div>
      <div class="edit-item"><label>생산과</label>
        <input id="ep_${w.id}" value="${esc(w.dept||'')}" placeholder="부서명"></div>
      <div class="edit-item full"><label>완료 시간</label>
        <input type="time" id="ee_${w.id}" value="${esc(w.endtime||'')}"></div>
      <div class="edit-item full"><label>⚠️ 특이사항</label>
        <textarea class="note-inp" id="en_${w.id}" rows="2" placeholder="특이사항">${esc(w.note||'')}</textarea></div>
    </div>
    <button class="save-btn" onclick="saveWork('${date}','${w.id}')">💾 저장</button>
  </div>
</div>`;
}

function toggleBody(id){
  document.getElementById(id)?.classList.toggle('open');
}

function toggleDone(date, wid){
  const list = works[date]; if(!list) return;
  const w = list.find(x=>x.id===wid); if(!w) return;
  w.done = !w.done;
  // 완료 시 현재 시간 자동 입력 (endtime 없을 때만)
  if(w.done && !w.endtime){
    w.endtime = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Asia/Seoul'});
  }
  SS('worklog_v1', works);
  showToast(w.done?'✅ 완료 처리되었습니다':'↩ 완료 취소되었습니다');
  renderLog();
}

function saveWork(date, wid){
  const list = works[date]; if(!list) return;
  const w = list.find(x=>x.id===wid); if(!w) return;
  w.desc    = document.getElementById('ed_'+wid)?.value.trim() || w.desc;
  w.tag     = document.getElementById('et_'+wid)?.value.trim() || '';
  w.dept    = document.getElementById('ep_'+wid)?.value.trim() || '';
  w.endtime = document.getElementById('ee_'+wid)?.value || '';
  w.note    = document.getElementById('en_'+wid)?.value.trim() || '';
  SS('worklog_v1', works);
  showToast('✅ 저장되었습니다');
  renderLog();
}

// ── 작업 추가 ─────────────────────────────────────────
function openAddModal(){
  document.getElementById('a_desc').value='';
  document.getElementById('a_tag').value='';
  document.getElementById('a_dept').value='';
  document.getElementById('a_note').value='';
  document.getElementById('addModal').classList.add('open');
  setTimeout(()=>document.getElementById('a_desc').focus(), 300);
}
function closeAddModal(){document.getElementById('addModal').classList.remove('open');}

function addWork(){
  const desc = document.getElementById('a_desc').value.trim();
  if(!desc){showToast('⚠️ 작업 내용을 입력하세요');return;}
  const date = document.getElementById('dateInput').value || kstToday();
  if(!works[date]) works[date]=[];
  works[date].push({
    id: 'w'+Date.now(),
    desc,
    tag:     document.getElementById('a_tag').value.trim(),
    dept:    document.getElementById('a_dept').value.trim(),
    endtime: '',
    note:    document.getElementById('a_note').value.trim(),
    done:    false,
  });
  SS('worklog_v1', works);
  closeAddModal();
  showToast('➕ 작업이 등록되었습니다');
  renderLog();
}

// ── 삭제 ──────────────────────────────────────────────
function confirmDel(date, wid, label){
  pendingDel={date,wid};
  document.getElementById('confirmDesc').textContent=label;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm(){pendingDel=null;document.getElementById('confirmOverlay').classList.remove('open');}
function doDelete(){
  if(!pendingDel) return;
  const {date,wid}=pendingDel;
  if(works[date]) works[date]=works[date].filter(w=>w.id!==wid);
  SS('worklog_v1',works);
  closeConfirm(); showToast('🗑️ 삭제되었습니다');
  renderLog();
}

// ── 키워드 검색 ───────────────────────────────────────
function doSearch(){
  const q = document.getElementById('searchInput').value.trim();
  const el = document.getElementById('searchResult');
  if(!q){el.innerHTML='<div class="empty"><div class="ico">🔍</div>검색어를 입력하세요</div>';return;}

  const qLow = q.toLowerCase();
  const results = [];

  Object.keys(works).sort((a,b)=>b.localeCompare(a)).forEach(date=>{
    works[date].forEach(w=>{
      const text = [w.desc, w.tag, w.dept, w.note].join(' ').toLowerCase();
      if(text.includes(qLow)) results.push({date, w});
    });
  });

  if(!results.length){
    el.innerHTML=`<div class="empty"><div class="ico">😶</div>"${q}" 관련 작업이 없습니다</div>`;
    return;
  }

  function highlight(str){
    if(!str) return '';
    const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')', 'gi');
    return str.replace(re,'<mark>$1</mark>');
  }

  el.innerHTML = `<div style="font-size:11px;color:var(--text2);margin-bottom:10px">총 ${results.length}건 검색됨</div>` +
    results.map(({date,w})=>`
    <div class="search-result-item ${w.done?'sri-done':'sri-pending'}">
      <div class="sri-date">${fmtDate(date)}${w.done&&w.endtime?' · ✅ '+w.endtime+' 완료':w.done?' · ✅ 완료':' · ⏳ 미완료'}</div>
      <div class="sri-desc">${highlight(w.desc)}</div>
      <div class="sri-meta">
        ${w.dept?`<span class="chip dept">🏭 ${highlight(w.dept)}</span>`:''}
        ${w.tag?`<span class="chip tag">🔧 ${highlight(w.tag)}</span>`:''}
        ${w.note?`<div style="font-size:10px;color:var(--red);margin-top:4px;width:100%">⚠️ ${highlight(w.note)}</div>`:''}
      </div>
    </div>`).join('');
}

// ── 유틸 ──────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ── 초기화 ────────────────────────────────────────────
(function init(){
  const today = kstToday();
  document.getElementById('dateInput').value = today;
  document.getElementById('todayBadge').textContent = fmtDate(today);
  renderLog();
})();
</script>
</body>
</html>
