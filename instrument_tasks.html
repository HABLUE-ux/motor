<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>계기 정기보수 관리</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
  :root{
    --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3450;
    --accent:#3d6fff;--red:#ff4d6d;--green:#06d6a0;--yellow:#ffd166;--orange:#f4a261;--purple:#b57bee;
    --text:#e8eaf6;--text2:#8b92b8;--text3:#555e8a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

  .header{background:linear-gradient(135deg,#1a1d27,#22263a);border-bottom:1px solid var(--border);padding:16px;position:sticky;top:0;z-index:100}
  .header h1{font-size:18px;font-weight:700;letter-spacing:-0.3px}
  .header p{font-size:11px;color:var(--text2);margin-top:2px}

  /* 메인 탭 */
  .main-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:65px;z-index:99}
  .main-tab{flex:1;padding:12px 6px;text-align:center;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
  .main-tab.active.td{color:var(--orange);border-bottom-color:var(--orange);background:rgba(244,162,97,.07)}
  .main-tab.active.cc{color:var(--purple);border-bottom-color:var(--purple);background:rgba(181,123,238,.07)}
  .main-tab.active.work{color:var(--accent);border-bottom-color:var(--accent);background:rgba(61,111,255,.07)}

  /* 서브 탭 (작업리스트용) */
  .sub-tabs{display:flex;background:var(--surface2);border-bottom:1px solid var(--border);position:sticky;top:114px;z-index:98}
  .sub-tab{flex:1;padding:10px 6px;text-align:center;font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
  .sub-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

  /* 요약 카드 */
  .summary{display:flex;gap:8px;padding:12px 12px 0;overflow-x:auto;scrollbar-width:none}
  .summary::-webkit-scrollbar{display:none}
  .stat-card{flex:1;min-width:80px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
  .stat-card .num{font-size:22px;font-weight:900}
  .stat-card .lbl{font-size:10px;color:var(--text2);margin-top:2px}
  .stat-card.total .num{color:var(--accent)}
  .stat-card.out .num{color:var(--red)}
  .stat-card.in .num{color:var(--green)}
  .stat-card.done .num{color:var(--green)}
  .stat-card.remain .num{color:var(--yellow)}

  /* 진행률 */
  .progress-wrap{padding:10px 12px 0}
  .progress-bar-bg{background:var(--surface2);border-radius:99px;height:6px;overflow:hidden}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:99px;transition:width .4s ease}
  .progress-label{font-size:10px;color:var(--text2);margin-top:4px;text-align:right}

  .item-list{padding:10px 12px 100px}

  /* 밸브 카드 (전동기 스타일) */
  .valve-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
  .valve-card.exported{border-left:3px solid var(--red)}
  .valve-card.imported{border-left:3px solid var(--green)}

  .valve-header{display:flex;align-items:center;padding:12px;gap:10px;cursor:pointer;user-select:none}
  .valve-name{font-size:14px;font-weight:700;letter-spacing:.3px}
  .valve-spec{font-size:10px;color:var(--text3);margin-top:2px;line-height:1.4}
  .valve-header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}

  .badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
  .badge.out{background:rgba(255,77,109,.15);color:var(--red);border:1px solid rgba(255,77,109,.3)}
  .badge.in{background:rgba(6,214,160,.15);color:var(--green);border:1px solid rgba(6,214,160,.3)}
  .badge.none{background:rgba(139,146,184,.1);color:var(--text2);border:1px solid var(--border)}

  .valve-body{padding:0 12px 12px;border-top:1px solid var(--border);display:none}
  .valve-body.open{display:block}
  .status-info{margin-top:10px;font-size:11px;color:var(--text2);padding:6px 8px;background:var(--surface2);border-radius:6px}
  .status-info span.red{color:var(--red)}
  .status-info span.green{color:var(--green)}

  .action-row{display:flex;gap:8px;margin-top:10px}
  .btn{flex:1;padding:9px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
  .btn-out{background:rgba(255,77,109,.15);color:var(--red);border:1px solid rgba(255,77,109,.3)}
  .btn-out:active{background:rgba(255,77,109,.3)}
  .btn-in{background:rgba(6,214,160,.15);color:var(--green);border:1px solid rgba(6,214,160,.3)}
  .btn-in:active{background:rgba(6,214,160,.3)}
  .btn-reset{background:rgba(139,146,184,.1);color:var(--text2);border:1px solid var(--border)}

  /* 작업 카드 */
  .task-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
  .task-card.completed{opacity:.55;border-left:3px solid var(--green)}
  .task-card.outsource{border-left:3px solid var(--red)}
  .task-card.completed.outsource{border-left:3px solid var(--green)}
  .task-row{display:flex;align-items:center;padding:12px;gap:10px}
  .task-no{font-size:11px;color:var(--text3);font-weight:700;min-width:20px;text-align:center;flex-shrink:0}
  .task-info{flex:1;min-width:0}
  .task-desc{font-size:13px;font-weight:500;line-height:1.4;word-break:keep-all}
  .task-desc.done-text{text-decoration:line-through;color:var(--text3)}
  .task-meta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center}
  .tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
  .tag.out{background:rgba(255,77,109,.15);color:var(--red);border:1px solid rgba(255,77,109,.3)}
  .tag.self{background:rgba(139,146,184,.1);color:var(--text2);border:1px solid var(--border)}
  .tag.person{background:rgba(61,111,255,.1);color:var(--accent);border:1px solid rgba(61,111,255,.2)}
  .tag.done-tag{background:rgba(6,214,160,.1);color:var(--green);border:1px solid rgba(6,214,160,.3)}
  .task-actions{display:flex;gap:6px;flex-shrink:0;align-items:center}
  .check-btn{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:transparent;flex-shrink:0;transition:all .2s}
  .check-btn.checked{background:var(--green);border-color:var(--green);color:#fff}

  .del-btn{width:24px;height:24px;border-radius:50%;border:1px solid rgba(255,77,109,.3);background:rgba(255,77,109,.08);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--red);flex-shrink:0}
  .del-btn:active{background:rgba(255,77,109,.3)}

  .section{display:none}.section.active{display:block}
  .sub-section{display:none}.sub-section.active{display:block}

  /* 반출입 이력 */
  .history-wrap{padding:12px}
  .date-row{display:flex;gap:8px;align-items:center;margin-bottom:12px}
  .date-row label{font-size:12px;color:var(--text2);white-space:nowrap}
  .date-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
  .date-input:focus{border-color:var(--accent)}
  .hist-group{margin-bottom:14px}
  .hist-title{font-size:11px;font-weight:700;padding:5px 10px;border-radius:6px;margin-bottom:6px}
  .hist-title.out-t{background:rgba(255,77,109,.1);color:var(--red)}
  .hist-title.in-t{background:rgba(6,214,160,.1);color:var(--green)}
  .hist-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
  .hist-name{font-size:13px;font-weight:700}
  .hist-meta{font-size:11px;color:var(--text2);margin-top:2px}
  .hist-time{font-size:11px;color:var(--text3)}

  /* FAB */
  .fab{position:fixed;bottom:24px;right:20px;width:54px;height:54px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 24px rgba(61,111,255,.45);z-index:200;display:flex;align-items:center;justify-content:center;transition:transform .15s}
  .fab:active{transform:scale(.9)}

  /* 모달 */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:none;align-items:flex-end;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:24px 20px;padding-bottom:calc(24px + env(safe-area-inset-bottom));max-height:85vh;overflow-y:auto}
  .modal-title{font-size:16px;font-weight:700;margin-bottom:4px}
  .modal-sub{font-size:11px;color:var(--text2);margin-bottom:16px}
  .field-label{font-size:11px;color:var(--text3);display:block;margin-bottom:5px;margin-top:14px;font-weight:500}
  .modal input,.modal textarea,.modal select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:13px;font-family:inherit;outline:none;resize:none;-webkit-appearance:none}
  .modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--accent)}
  .modal-btns{display:flex;gap:8px;margin-top:18px}
  .modal-btn{flex:1;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .modal-btn.cancel{background:var(--surface2);color:var(--text2)}
  .modal-btn.confirm{background:var(--accent);color:#fff}

  /* 삭제 확인 */
  .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:400;display:none;align-items:center;justify-content:center;padding:20px}
  .confirm-overlay.open{display:flex}
  .confirm-box{background:var(--surface);border-radius:18px;padding:22px 20px;width:100%;max-width:320px}
  .confirm-title{font-size:15px;font-weight:700;margin-bottom:8px}
  .confirm-desc{font-size:12px;margin-bottom:20px;background:var(--surface2);padding:10px 12px;border-radius:8px;color:var(--text);font-weight:700;line-height:1.5}
  .confirm-btns{display:flex;gap:8px}
  .confirm-btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .confirm-btn.cancel{background:var(--surface2);color:var(--text2)}
  .confirm-btn.del{background:rgba(255,77,109,.15);color:var(--red);border:1px solid rgba(255,77,109,.3)}

  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:10px 20px;font-size:12px;color:var(--text);opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .empty-msg{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
</style>
</head>
<body>

<div class="header">
  <h1>🔩 계기 정기보수 관리</h1>
  <p>카본 U-1,3 · U-2 · U-5 구역</p>
</div>

<div class="main-tabs">
  <div class="main-tab td active" onclick="switchMain('td')">🔧 T/D 밸브</div>
  <div class="main-tab cc"        onclick="switchMain('cc')">⚙️ C/C 밸브</div>
  <div class="main-tab work"      onclick="switchMain('work')">📋 작업리스트</div>
</div>

<!-- T/D 밸브 -->
<div id="sec-td" class="section active">
  <div class="summary" id="summary-td"></div>
  <div class="item-list" id="list-td"></div>
</div>

<!-- C/C 밸브 -->
<div id="sec-cc" class="section">
  <div class="summary" id="summary-cc"></div>
  <div class="item-list" id="list-cc"></div>
</div>

<!-- 작업리스트 -->
<div id="sec-work" class="section">
  <div class="sub-tabs">
    <div class="sub-tab active" onclick="switchSub('u13')">U-1,3</div>
    <div class="sub-tab"        onclick="switchSub('u2')">U-2</div>
    <div class="sub-tab"        onclick="switchSub('u5')">U-5</div>
    <div class="sub-tab"        onclick="switchSub('hist')">반출입 이력</div>
  </div>
  <div id="sub-u13"  class="sub-section active">
    <div class="summary" id="summary-u13"></div>
    <div class="progress-wrap" id="progress-u13"></div>
    <div class="item-list" id="list-u13"></div>
  </div>
  <div id="sub-u2" class="sub-section">
    <div class="summary" id="summary-u2"></div>
    <div class="progress-wrap" id="progress-u2"></div>
    <div class="item-list" id="list-u2"></div>
  </div>
  <div id="sub-u5" class="sub-section">
    <div class="summary" id="summary-u5"></div>
    <div class="progress-wrap" id="progress-u5"></div>
    <div class="item-list" id="list-u5"></div>
  </div>
  <div id="sub-hist" class="sub-section">
    <div class="history-wrap">
      <div class="date-row">
        <label>날짜 선택</label>
        <input type="date" class="date-input" id="histDate" onchange="renderHist()">
      </div>
      <div id="histContent"></div>
    </div>
  </div>
</div>

<button class="fab" onclick="openModal()">＋</button>

<!-- 추가 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">항목 추가</div>
    <div class="modal-sub" id="modal-sub"></div>
    <!-- 밸브 추가 필드 -->
    <div id="fld-valve">
      <label class="field-label">ITEM NO</label>
      <input type="text" id="inp-itemno" placeholder="예) PCV-305">
      <label class="field-label">SIZE/SPEC</label>
      <textarea id="inp-spec" rows="2" placeholder="예) 16B JIS 10K, Disc Damper"></textarea>
    </div>
    <!-- 작업 추가 필드 -->
    <div id="fld-work" style="display:none">
      <label class="field-label">구역</label>
      <select id="inp-region">
        <option value="u13">U-1,3</option>
        <option value="u2">U-2</option>
        <option value="u5">U-5</option>
      </select>
      <label class="field-label">작업 내용</label>
      <textarea id="inp-desc" rows="3" placeholder="작업 내용을 입력하세요"></textarea>
      <label class="field-label">수리 구분</label>
      <select id="inp-type">
        <option value="자체">자체</option>
        <option value="외주">외주</option>
      </select>
      <label class="field-label">담당자</label>
      <input type="text" id="inp-person" placeholder="예) 고승찬">
    </div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn confirm" onclick="addItem()">추가하기</button>
    </div>
  </div>
</div>

<!-- 삭제 확인 -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title">🗑️ 항목 삭제</div>
    <div class="confirm-desc" id="confirmDesc"></div>
    <div class="confirm-btns">
      <button class="confirm-btn cancel" onclick="closeConfirm()">취소</button>
      <button class="confirm-btn del"    onclick="doDelete()">삭제</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 초기 데이터 ───────────────────────────────────────

// T/D 밸브: 밸브별로 분리
const DEFAULT_TD = [
  {id:'td-1',  name:'FV-213A', spec:''},
  {id:'td-2',  name:'HV-213A', spec:''},
  {id:'td-3',  name:'FV-213B', spec:''},
  {id:'td-4',  name:'HV-213B', spec:''},
  {id:'td-5',  name:'FV-273',  spec:''},
  {id:'td-6',  name:'HV-273',  spec:''},
  {id:'td-7',  name:'FV-293',  spec:''},
  {id:'td-8',  name:'HV-293',  spec:''},
  {id:'td-9',  name:'PCV-305', spec:''},
  {id:'td-10', name:'PCV-7501',spec:''},
  {id:'td-11', name:'PCV-3501',spec:''},
];

// C/C 밸브: 밸브별로 분리
const DEFAULT_CC = [
  {id:'cc-1',  name:'PCV-516A', spec:''},
  {id:'cc-2',  name:'PV-501A',  spec:''},
  {id:'cc-3',  name:'FV-214',   spec:''},
  {id:'cc-4',  name:'HV-214',   spec:''},
  {id:'cc-5',  name:'FV-244',   spec:''},
  {id:'cc-6',  name:'HV-244',   spec:''},
  {id:'cc-7',  name:'FV-274',   spec:''},
  {id:'cc-8',  name:'HV-274',   spec:''},
  {id:'cc-9',  name:'FV-210',   spec:''},
  {id:'cc-10', name:'FV-240',   spec:''},
  {id:'cc-11', name:'TCV-216',  spec:''},
  {id:'cc-12', name:'PV-112B',  spec:''},
  {id:'cc-13', name:'QCD-2900A',spec:''},
];

const DEFAULT_WORK = {
  u13:[
    {id:'w13-1',  no:1,  type:'자체',person:'고승찬·김지윤',desc:'R-207 TCV-295 Maker KOSO -> R-201~205, 204 동일 사양 Quench Control Valve Maker/Type/Spec 통일 - 운전방법 일원화 기여'},
    {id:'w13-2',  no:2,  type:'외주',person:'고승찬·김지윤',desc:'종점관리 계측기(질량식, 차압식 계기) 검교정\n- 질량식 외부 검교정, 차압식 외주 업체 현장 교정'},
    {id:'w13-3',  no:3,  type:'자체',person:'고승찬·김지윤',desc:'PV-353B POSITIONER DIR, REV 교체'},
    {id:'w13-4',  no:4,  type:'자체',person:'고승찬·김지윤',desc:'Tread HCV-279, 293 Trim Part 교체(Plug 파손, Cv 일원화)'},
    {id:'w13-5',  no:5,  type:'외주',person:'형성완',desc:'FAD Line Control Valve 분해/Cleaning 작업\n- FV-213A, HV-213A, FV-213B, HV-213B, FV-273, HV-273, FV-293, HV-293'},
    {id:'w13-6',  no:6,  type:'자체',person:'고승찬·김지윤',desc:'FQI-245 교체(적산계, BYPASS 막힘, BLOCK VALVE 파손)'},
    {id:'w13-7',  no:7,  type:'자체',person:'고승찬·김지윤',desc:'R-201~207 Bottom 온도센서 & Well 취외 점검'},
    {id:'w13-8',  no:8,  type:'자체',person:'고승찬·김지윤',desc:'TI-205 온도계 & Well 교체\nSensor 길이 : 270mm(취외분 305mm)'},
    {id:'w13-9',  no:9,  type:'자체',person:'고승찬·김지윤',desc:'XV-201, 203, 205, 207 점검\n20A JIS 10K, Ball Valve - 삼성정공, Actuator: Automa\n정상동작 및 Passing 여부 확인, 이상 발생분 구매 예정'},
    {id:'w13-10', no:10, type:'외주',person:'형성완',desc:'PCV-305 보수 반풀\n50% 정도에서 걸려서 동작 되지 않음'},

// ── 저장/불러오기 ─────────────────────────────────────
function loadL(key, def){
  try{const s=localStorage.getItem(key);if(s)return JSON.parse(s);}catch(e){}
  return def.map(t=>({...t}));
}
function saveL(key,data){localStorage.setItem(key,JSON.stringify(data));}
function loadStatus(){
  try{const s=localStorage.getItem('instr_status_v1');if(s)return JSON.parse(s);}catch(e){}
  return {};
}
function saveStatus(){localStorage.setItem('instr_status_v1',JSON.stringify(statusMap));}
function loadHist2(){
  try{const s=localStorage.getItem('instr_hist_v1');if(s)return JSON.parse(s);}catch(e){}
  return [];
}
function saveHist2(){localStorage.setItem('instr_hist_v1',JSON.stringify(valveHist));}
function loadDone(){
  try{const s=localStorage.getItem('instr_done_v1');if(s)return JSON.parse(s);}catch(e){}
  return {};
}
function saveDone(){localStorage.setItem('instr_done_v1',JSON.stringify(doneMap));}

let tdList  = loadL('instr_td_v1',  DEFAULT_TD);
let ccList  = loadL('instr_cc_v1',  DEFAULT_CC);
let wU13    = loadL('instr_w13_v1', DEFAULT_WORK.u13);
let wU2     = loadL('instr_w2_v1',  DEFAULT_WORK.u2);
let wU5     = loadL('instr_w5_v1',  DEFAULT_WORK.u5);
// statusMap: {valveId: 'none'|'exported'|'imported', exportDate, importDate}
let statusMap = loadStatus();
let valveHist = loadHist2();
let doneMap   = loadDone();
let pendingDel= null;

let curMain='td', curSub='u13';

function today(){return new Date().toISOString().split('T')[0];}
function nowTime(){return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});}

// ── 탭 전환 ──────────────────────────────────────────
function switchMain(tab){
  curMain=tab;
  document.querySelectorAll('.main-tab').forEach(el=>el.classList.remove('active'));
  document.querySelector('.main-tab.'+tab).classList.add('active');
  document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
  if(tab==='td') renderValves('td');
  else if(tab==='cc') renderValves('cc');
  else renderWork(curSub);
}

function switchSub(sub){
  curSub=sub;
  document.querySelectorAll('.sub-tab').forEach((el,i)=>
    el.classList.toggle('active',['u13','u2','u5','hist'][i]===sub));
  document.querySelectorAll('.sub-section').forEach(el=>el.classList.remove('active'));
  document.getElementById('sub-'+sub).classList.add('active');
  if(sub==='hist'){
    if(!document.getElementById('histDate').value)
      document.getElementById('histDate').value=today();
    renderHist();
  } else renderWork(sub);
}

// ── 밸브 렌더 ────────────────────────────────────────
function getValveList(key){return key==='td'?tdList:ccList;}
function getValveLabel(key){return key==='td'?'T/D':'C/C';}

function renderValves(key){
  const list=getValveList(key);
  const el=document.getElementById('summary-'+key); if(!el) return;
  const exp=list.filter(v=>(statusMap[v.id]||{}).status==='exported').length;
  const imp=list.filter(v=>(statusMap[v.id]||{}).status==='imported').length;
  el.innerHTML=`
    <div class="stat-card total"><div class="num">${list.length}</div><div class="lbl">전체</div></div>
    <div class="stat-card out"><div class="num">${exp}</div><div class="lbl">반출중</div></div>
    <div class="stat-card in"><div class="num">${imp}</div><div class="lbl">수리완료</div></div>`;
  const listEl=document.getElementById('list-'+key);
  if(!list.length){listEl.innerHTML='<div class="empty-msg">등록된 밸브가 없습니다</div>';return;}
  const sorted=[...list].sort((a,b)=>a.name.localeCompare(b.name));
  listEl.innerHTML=sorted.map(v=>buildValveCard(v,key)).join('');
}

function buildValveCard(v,key){
  const uid=key+'__'+v.id;
  const st=(statusMap[v.id]||{}).status||'none';
  const expDate=(statusMap[v.id]||{}).exportDate||'';
  const impDate=(statusMap[v.id]||{}).importDate||'';
  const cls=st==='exported'?'exported':st==='imported'?'imported':'';
  const bCls=st==='exported'?'out':st==='imported'?'in':'none';
  const bTxt=st==='exported'?'반출':st==='imported'?'수리완료':'정상';
  let si='';
  if(st==='exported'&&expDate) si=`<div class="status-info">반출일: <span class="red">${expDate}</span></div>`;
  else if(st==='imported'&&impDate) si=`<div class="status-info">반입일: <span class="green">${impDate}</span> · 수리완료</div>`;
  return `
<div class="valve-card ${cls}" id="vcard-${uid}">
  <div class="valve-header" onclick="toggleValve('${uid}')">
    <div style="flex:1;min-width:0">
      <div class="valve-name">${v.name}</div>
      <div class="valve-spec">${v.spec?v.spec:''}</div>
    </div>
    <div class="valve-header-right">
      <button class="del-btn" onclick="event.stopPropagation();confirmDel('${v.id}','${key}')">✕</button>
      <span class="badge ${bCls}">${bTxt}</span>
    </div>
  </div>
  <div class="valve-body" id="vbody-${uid}">
    ${si}
    <div class="action-row" style="margin-top:10px">
      <button class="btn btn-out"   onclick="setValveStatus('${uid}','exported')">📤 반출</button>
      <button class="btn btn-in"    onclick="setValveStatus('${uid}','imported')">📥 반입</button>
      <button class="btn btn-reset" onclick="setValveStatus('${uid}','none')">↩ 초기화</button>
    </div>
  </div>
</div>`;
}

function toggleValve(uid){
  const b=document.getElementById('vbody-'+uid);
  if(b) b.classList.toggle('open');
}

function setValveStatus(uid,status){
  const i=uid.indexOf('__');
  const key=uid.slice(0,i), vid=uid.slice(i+2);
  const v=getValveList(key).find(x=>x.id===vid); if(!v) return;
  const cur=(statusMap[vid]||{}).status||'none';
  if(status==='exported'){
    if(cur==='exported'){showToast('이미 반출된 밸브입니다');return;}
    statusMap[vid]={status:'exported',exportDate:today(),importDate:''};
    valveHist.push({vid,name:v.name,group:getValveLabel(key),action:'exported',date:today(),time:nowTime()});
    showToast('📤 반출 처리되었습니다');
  } else if(status==='imported'){
    if(cur==='imported'){showToast('이미 수리완료된 밸브입니다');return;}
    statusMap[vid]={...(statusMap[vid]||{}),status:'imported',importDate:today()};
    valveHist.push({vid,name:v.name,group:getValveLabel(key),action:'imported',date:today(),time:nowTime()});
    showToast('📥 반입(수리완료) 처리되었습니다');
  } else {
    statusMap[vid]={status:'none',exportDate:'',importDate:''};
    showToast('↩ 초기화되었습니다');
  }
  saveStatus(); saveHist2();
  // 카드 교체
  const card=document.getElementById('vcard-'+uid);
  if(card){
    const wasOpen=document.getElementById('vbody-'+uid)?.classList.contains('open');
    const dummy=document.createElement('div');
    dummy.innerHTML=buildValveCard(v,key);
    card.replaceWith(dummy.firstElementChild);
    if(wasOpen) document.getElementById('vbody-'+uid)?.classList.add('open');
  }
  renderValveSummary(key);
}

function renderValveSummary(key){
  const list=getValveList(key);
  const el=document.getElementById('summary-'+key); if(!el) return;
  const exp=list.filter(v=>(statusMap[v.id]||{}).status==='exported').length;
  const imp=list.filter(v=>(statusMap[v.id]||{}).status==='imported').length;
  el.innerHTML=`
    <div class="stat-card total"><div class="num">${list.length}</div><div class="lbl">전체</div></div>
    <div class="stat-card out"><div class="num">${exp}</div><div class="lbl">반출중</div></div>
    <div class="stat-card in"><div class="num">${imp}</div><div class="lbl">수리완료</div></div>`;
}

// ── 작업 렌더 ────────────────────────────────────────
function getWork(sub){return{u13:wU13,u2:wU2,u5:wU5}[sub];}
function saveWork(sub){saveL({'u13':'instr_w13_v1','u2':'instr_w2_v1','u5':'instr_w5_v1'}[sub],getWork(sub));}

function renderWork(sub){
  const list=getWork(sub); if(!list) return;
  const done=list.filter(t=>doneMap[t.id]).length;
  const el=document.getElementById('summary-'+sub); if(!el) return;
  el.innerHTML=`
    <div class="stat-card total"><div class="num">${list.length}</div><div class="lbl">전체</div></div>
    <div class="stat-card done"><div class="num">${done}</div><div class="lbl">완료</div></div>
    <div class="stat-card remain"><div class="num">${list.length-done}</div><div class="lbl">미완료</div></div>`;
  const pel=document.getElementById('progress-'+sub); if(pel){
    const pct=list.length?Math.round(done/list.length*100):0;
    pel.innerHTML=`<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div><div class="progress-label">${pct}% 완료</div>`;
  }
  const lel=document.getElementById('list-'+sub); if(!lel) return;
  lel.innerHTML=list.length?list.map(t=>buildTaskCard(t,sub)).join(''):'<div class="empty-msg">등록된 작업이 없습니다</div>';
}

function buildTaskCard(t,sub){
  const uid=sub+'__'+t.id;
  const done=!!doneMap[t.id];
  const isOut=t.type.includes('외주');
  return `
<div class="task-card ${done?'completed':''} ${isOut&&!done?'outsource':''}" id="tcard-${uid}">
  <div class="task-row">
    <div class="task-no">${t.no}</div>
    <div class="task-info">
      <div class="task-desc ${done?'done-text':''}">${(t.desc||'').replace(/\n/g,'<br>')}</div>
      <div class="task-meta">
        <span class="tag ${isOut?'out':'self'}">${t.type}</span>
        <span class="tag person">👤 ${t.person}</span>
        ${done?'<span class="tag done-tag">✅ 완료</span>':''}
      </div>
    </div>
    <div class="task-actions">
      <button class="del-btn" onclick="confirmDel('${t.id}','${sub}')">✕</button>
      <button class="check-btn ${done?'checked':''}" onclick="toggleDone('${uid}','${t.id}','${sub}')">✓</button>
    </div>
  </div>
</div>`;
}

function toggleDone(uid,tid,sub){
  doneMap[tid]=!doneMap[tid]; saveDone();
  showToast(doneMap[tid]?'✅ 완료 처리되었습니다':'↩ 완료 취소되었습니다');
  renderWork(sub);
}

// ── 반출입 이력 ──────────────────────────────────────
function renderHist(){
  const date=document.getElementById('histDate').value;
  const el=document.getElementById('histContent'); if(!date||!el) return;
  const day=valveHist.filter(h=>h.date===date);
  const outs=day.filter(h=>h.action==='exported');
  const ins =day.filter(h=>h.action==='imported');
  if(!day.length){el.innerHTML=`<div class="empty-msg">${date}<br>반출·반입 이력이 없습니다</div>`;return;}
  const row=h=>`<div class="hist-item"><div><div class="hist-name">${h.name}</div><div class="hist-meta">${h.group}</div></div><div class="hist-time">${h.time||''}</div></div>`;
  let html='';
  if(outs.length) html+=`<div class="hist-group"><div class="hist-title out-t">📤 반출 (${outs.length}건)</div>${outs.map(row).join('')}</div>`;
  if(ins.length)  html+=`<div class="hist-group"><div class="hist-title in-t">📥 반입·수리완료 (${ins.length}건)</div>${ins.map(row).join('')}</div>`;
  el.innerHTML=html;
}

// ── 추가 모달 ────────────────────────────────────────
function openModal(){
  const isValve=(curMain==='td'||curMain==='cc');
  document.getElementById('fld-valve').style.display=isValve?'block':'none';
  document.getElementById('fld-work').style.display=isValve?'none':'block';
  if(isValve){
    document.getElementById('modal-title').textContent=curMain==='td'?'🔧 T/D 밸브 추가':'⚙️ C/C 밸브 추가';
    document.getElementById('modal-sub').textContent='밸브를 추가합니다';
    document.getElementById('inp-itemno').value='';
    document.getElementById('inp-spec').value='';
  } else {
    document.getElementById('modal-title').textContent='📋 작업 추가';
    document.getElementById('modal-sub').textContent='정기보수 작업을 추가합니다';
    document.getElementById('inp-region').value=curSub==='hist'?'u13':curSub;
    document.getElementById('inp-desc').value='';
    document.getElementById('inp-type').value='자체';
    document.getElementById('inp-person').value='';
  }
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function closeModalOutside(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}

function addItem(){
  const isValve=(curMain==='td'||curMain==='cc');
  if(isValve){
    const name=document.getElementById('inp-itemno').value.trim().toUpperCase();
    const spec=document.getElementById('inp-spec').value.trim();
    if(!name){showToast('⚠️ ITEM NO를 입력하세요');return;}
    const list=getValveList(curMain);
    if(list.find(v=>v.name===name)){showToast('⚠️ 이미 존재하는 밸브입니다');return;}
    list.push({id:'c'+Date.now(),name,spec});
    saveL(curMain==='td'?'instr_td_v1':'instr_cc_v1',list);
    closeModal(); showToast('➕ 밸브가 추가되었습니다');
    renderValves(curMain);
  } else {
    const region=document.getElementById('inp-region').value;
    const desc  =document.getElementById('inp-desc').value.trim();
    const type  =document.getElementById('inp-type').value;
    const person=document.getElementById('inp-person').value.trim();
    if(!desc){showToast('⚠️ 작업 내용을 입력하세요');return;}
    if(!person){showToast('⚠️ 담당자를 입력하세요');return;}
    const list=getWork(region);
    const maxNo=list.length?Math.max(...list.map(t=>t.no)):0;
    list.push({id:'c'+Date.now(),no:maxNo+1,type,person,desc});
    saveWork(region);
    closeModal(); showToast('➕ 작업이 추가되었습니다');
    curSub=region; switchSub(region);
  }
}

// ── 삭제 ─────────────────────────────────────────────
function confirmDel(id,key){
  pendingDel={id,key};
  let label='';
  if(key==='td'||key==='cc'){
    const v=getValveList(key).find(x=>x.id===id);
    label=v?v.name:'';
  } else {
    const t=getWork(key)?.find(x=>x.id===id);
    label=t?(t.desc||'').slice(0,40)+'…':'';
  }
  document.getElementById('confirmDesc').textContent=label;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm(){pendingDel=null;document.getElementById('confirmOverlay').classList.remove('open');}
function doDelete(){
  if(!pendingDel) return;
  const {id,key}=pendingDel;
  if(key==='td'||key==='cc'){
    const list=getValveList(key);
    const idx=list.findIndex(x=>x.id===id);
    if(idx>-1) list.splice(idx,1);
    delete statusMap[id]; saveStatus();
    saveL(key==='td'?'instr_td_v1':'instr_cc_v1',list);
    closeConfirm(); showToast('🗑️ 밸브가 삭제되었습니다');
    renderValves(key);
  } else {
    const list=getWork(key);
    const idx=list.findIndex(x=>x.id===id);
    if(idx>-1){list.splice(idx,1);list.forEach((t,i)=>t.no=i+1);}
    delete doneMap[id]; saveDone(); saveWork(key);
    closeConfirm(); showToast('🗑️ 작업이 삭제되었습니다');
    renderWork(key);
  }
}

// ── 토스트 ───────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ── 초기화 ───────────────────────────────────────────
renderValves('td');
</script>
