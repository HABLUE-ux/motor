<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>정기보수 작업 리스트</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3450;
    --accent:#3d6fff; --red:#ff4d6d; --green:#06d6a0; --yellow:#ffd166;
    --text:#e8eaf6; --text2:#8b92b8; --text3:#555e8a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

  .header{background:linear-gradient(135deg,#1a1d27,#22263a);border-bottom:1px solid var(--border);padding:16px;position:sticky;top:0;z-index:100}
  .header h1{font-size:18px;font-weight:700;letter-spacing:-0.3px}
  .header p{font-size:11px;color:var(--text2);margin-top:2px}

  .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:65px;z-index:99}
  .tab{flex:1;padding:12px 8px;text-align:center;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(61,111,255,.07)}

  .summary{display:flex;gap:8px;padding:12px 12px 0}
  .stat-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
  .stat-card .num{font-size:22px;font-weight:900}
  .stat-card .lbl{font-size:10px;color:var(--text2);margin-top:2px}
  .stat-card.total .num{color:var(--accent)}
  .stat-card.done .num{color:var(--green)}
  .stat-card.remain .num{color:var(--yellow)}

  .progress-wrap{padding:10px 12px 0}
  .progress-bar-bg{background:var(--surface2);border-radius:99px;height:6px;overflow:hidden}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:99px;transition:width .4s ease}
  .progress-label{font-size:10px;color:var(--text2);margin-top:4px;text-align:right}

  .task-list{padding:10px 12px 100px}

  .task-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;transition:all .2s}
  .task-card.completed{opacity:.55;border-left:3px solid var(--green)}
  .task-card.outsource{border-left:3px solid var(--red)}
  .task-card.completed.outsource{border-left:3px solid var(--green)}

  .task-row{display:flex;align-items:center;padding:12px;gap:10px}
  .task-no{font-size:11px;color:var(--text3);font-weight:700;min-width:20px;text-align:center;flex-shrink:0}
  .task-info{flex:1;min-width:0}
  .task-desc{font-size:13px;font-weight:500;line-height:1.4;word-break:keep-all}
  .task-desc.done-text{text-decoration:line-through;color:var(--text3)}
  .task-meta{display:flex;gap:6px;margin-top:4px;align-items:center;flex-wrap:wrap}
  .tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
  .tag.out{background:rgba(255,77,109,.15);color:var(--red);border:1px solid rgba(255,77,109,.3)}
  .tag.self{background:rgba(139,146,184,.1);color:var(--text2);border:1px solid var(--border)}
  .tag.person{background:rgba(61,111,255,.1);color:var(--accent);border:1px solid rgba(61,111,255,.2)}
  .tag.done-tag{background:rgba(6,214,160,.1);color:var(--green);border:1px solid rgba(6,214,160,.3)}

  .task-actions{display:flex;gap:6px;flex-shrink:0;align-items:center}
  .check-btn{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;transition:all .2s;color:transparent}
  .check-btn.checked{background:var(--green);border-color:var(--green);color:#fff}
  .del-btn{width:26px;height:26px;border-radius:50%;border:1px solid rgba(255,77,109,.3);background:rgba(255,77,109,.08);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--red);flex-shrink:0;transition:all .2s}
  .del-btn:active{background:rgba(255,77,109,.25)}

  .section{display:none}
  .section.active{display:block}

  .section-header{padding:10px 12px 2px;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase}

  /* 추가 버튼 */
  .fab{position:fixed;bottom:24px;right:20px;width:54px;height:54px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 24px rgba(61,111,255,.45);z-index:200;display:flex;align-items:center;justify-content:center;transition:transform .15s;line-height:1}
  .fab:active{transform:scale(.9)}

  /* 추가 모달 */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:none;align-items:flex-end;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:24px 20px;padding-bottom:calc(24px + env(safe-area-inset-bottom))}
  .modal-title{font-size:16px;font-weight:700;margin-bottom:4px}
  .modal-sub{font-size:11px;color:var(--text2);margin-bottom:16px}
  .field-label{font-size:11px;color:var(--text3);display:block;margin-bottom:5px;margin-top:14px;font-weight:500}
  .field-label:first-of-type{margin-top:0}
  .modal input,.modal textarea,.modal select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:13px;font-family:inherit;outline:none;resize:none;-webkit-appearance:none;appearance:none}
  .modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--accent)}
  .modal-btns{display:flex;gap:8px;margin-top:18px}
  .modal-btn{flex:1;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
  .modal-btn.cancel{background:var(--surface2);color:var(--text2)}
  .modal-btn.confirm{background:var(--accent);color:#fff}
  .modal-btn.confirm:active{opacity:.85}

  /* 삭제 확인 */
  .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:400;display:none;align-items:center;justify-content:center;padding:20px}
  .confirm-overlay.open{display:flex}
  .confirm-box{background:var(--surface);border-radius:18px;padding:22px 20px;width:100%;max-width:320px}
  .confirm-title{font-size:15px;font-weight:700;margin-bottom:8px}
  .confirm-desc{font-size:12px;color:var(--text2);margin-bottom:20px;line-height:1.5;background:var(--surface2);padding:10px 12px;border-radius:8px}
  .confirm-btns{display:flex;gap:8px}
  .confirm-btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .confirm-btn.cancel{background:var(--surface2);color:var(--text2)}
  .confirm-btn.del{background:rgba(255,77,109,.15);color:var(--red);border:1px solid rgba(255,77,109,.3)}

  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:10px 20px;font-size:12px;color:var(--text);opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .empty-msg{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
</style>
</head>
<body>

<div class="header">
  <h1>🔧 정기보수 작업 리스트</h1>
  <p>카본 U-1,3 · U-2 · U-5 구역</p>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('all')">전체</div>
  <div class="tab" onclick="switchTab('u13')">U-1,3</div>
  <div class="tab" onclick="switchTab('u2')">U-2</div>
  <div class="tab" onclick="switchTab('u5')">U-5</div>
</div>

<div id="sec-all" class="section active">
  <div class="summary" id="summary-all"></div>
  <div class="progress-wrap" id="progress-all"></div>
  <div class="task-list" id="list-all"></div>
</div>
<div id="sec-u13" class="section">
  <div class="summary" id="summary-u13"></div>
  <div class="progress-wrap" id="progress-u13"></div>
  <div class="task-list" id="list-u13"></div>
</div>
<div id="sec-u2" class="section">
  <div class="summary" id="summary-u2"></div>
  <div class="progress-wrap" id="progress-u2"></div>
  <div class="task-list" id="list-u2"></div>
</div>
<div id="sec-u5" class="section">
  <div class="summary" id="summary-u5"></div>
  <div class="progress-wrap" id="progress-u5"></div>
  <div class="task-list" id="list-u5"></div>
</div>

<!-- FAB -->
<button class="fab" onclick="openModal()">＋</button>

<!-- 추가 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">➕ 작업 추가</div>
    <div class="modal-sub">새로운 작업을 등록합니다</div>
    <label class="field-label">구역</label>
    <select id="inp-region">
      <option value="U-1,3">U-1,3</option>
      <option value="U-2">U-2</option>
      <option value="U-5">U-5</option>
    </select>
    <label class="field-label">작업 내용</label>
    <textarea id="inp-desc" rows="3" placeholder="작업 내용을 입력하세요"></textarea>
    <label class="field-label">수리 구분</label>
    <select id="inp-type">
      <option value="자체">자체</option>
      <option value="외주">외주</option>
    </select>
    <label class="field-label">담당자</label>
    <input type="text" id="inp-person" placeholder="담당자 이름">
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn confirm" onclick="addTask()">추가하기</button>
    </div>
  </div>
</div>

<!-- 삭제 확인 -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title">🗑️ 작업 삭제</div>
    <div class="confirm-desc" id="confirmDesc"></div>
    <div class="confirm-btns">
      <button class="confirm-btn cancel" onclick="closeConfirm()">취소</button>
      <button class="confirm-btn del" onclick="doDelete()">삭제</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_TASKS = [
  {id:'u13-1',  region:'U-1,3', no:1,  type:'외주', person:'진상현', desc:'Motor 수리 _ 중점설비 운전시간 Reset'},
  {id:'u13-2',  region:'U-1,3', no:2,  type:'자체', person:'손은택', desc:'Motor 절연저항 Check.'},
  {id:'u13-3',  region:'U-1,3', no:3,  type:'자체', person:'손은택·이인교', desc:'#3 변압기 중점설비 점검(4가지 항목)'},
  {id:'u13-4',  region:'U-1,3', no:4,  type:'자체', person:'손은택·이인교', desc:'#3 UPS 중점설비 점검(4가지 항목)'},
  {id:'u13-5',  region:'U-1,3', no:5,  type:'자체', person:'손은택·이인교', desc:'HV MOTOR 절연진단 및 PI TEST'},
  {id:'u13-6',  region:'U-1,3', no:6,  type:'자체', person:'손은택·이인교', desc:'HV- PNL\'(001,003,005) Pilot Lamp 교체.'},
  {id:'u13-7',  region:'U-1,3', no:7,  type:'자체', person:'손은택·이인교', desc:'CV-601 단자 상태 확인 및 MTR\' 진단.'},
  {id:'u13-8',  region:'U-1,3', no:8,  type:'자체', person:'손은택·이인교', desc:'CV-601 A/B 정지 확인.'},
  {id:'u13-9',  region:'U-1,3', no:9,  type:'자체', person:'손은택·이인교', desc:'저압 PNL\' 열화상 진단 불량 개소 정상화'},
  {id:'u13-10', region:'U-1,3', no:10, type:'자체', person:'손은택·이인교', desc:'과전류 계전기 OVER SETTING 정상화'},
  {id:'u13-11', region:'U-1,3', no:11, type:'자체', person:'손은택·이인교', desc:'FN-339 ML-301 NIPPLE 수정'},
  {id:'u13-12', region:'U-1,3', no:12, type:'자체', person:'진상현', desc:'MCC 203B-> C TYPE 밴경 및 레버 교체(NHBC-20V), ACB 정전작업'},
  {id:'u13-13', region:'U-1,3', no:13, type:'자체', person:'손은택·이인교', desc:'DR-501, 503 Cooling fan Cleaning'},
  {id:'u13-14', region:'U-1,3', no:14, type:'자체', person:'손은택·이인교', desc:'BL-001, 003, 007 Lube Oil 교체 및 Cooling fan Cleaning(20L 드럼 구매 #32)'},
  {id:'u13-15', region:'U-1,3', no:15, type:'외주', person:'진상현', desc:'CV-405 S/W Power 배관 보수'},
  {id:'u13-16', region:'U-1,3', no:16, type:'외주', person:'진상현', desc:'F-303 #6 LS 배관 보수'},
  {id:'u13-17', region:'U-1,3', no:17, type:'외주', person:'진상현', desc:'FN-337 Power 배관 보수'},
  {id:'u2-1',  region:'U-2', no:1,  type:'외주', person:'진상현', desc:'Motor 수리'},
  {id:'u2-2',  region:'U-2', no:2,  type:'자체', person:'손은택', desc:'Motor 절연저항 Check.'},
  {id:'u2-3',  region:'U-2', no:3,  type:'자체', person:'손은택', desc:'#3 변압기 중점설비 점검(4가지 항목)'},
  {id:'u2-4',  region:'U-2', no:4,  type:'자체', person:'손은택', desc:'#3 UPS 중점설비 점검(4가지 항목)'},
  {id:'u2-5',  region:'U-2', no:5,  type:'자체', person:'이인교', desc:'FN-314 활선경보기 동작 회로 철거'},
  {id:'u2-6',  region:'U-2', no:6,  type:'자체', person:'이인교', desc:'CV-600 단자 상태 확인 및 MTR\' 진단.'},
  {id:'u2-7',  region:'U-2', no:7,  type:'자체', person:'이인교', desc:'CV-600 A/B 접지 확인.'},
  {id:'u2-8',  region:'U-2', no:8,  type:'자체', person:'손은택', desc:'BL-006 VT 재취부 작업( BLOWER NDE 재탑작업 )'},
  {id:'u2-9',  region:'U-2', no:9,  type:'자체', person:'손은택', desc:'MX-400 Ampere Tranducer 철거 및 Converter 원상복귀'},
  {id:'u2-10', region:'U-2', no:10, type:'자체', person:'손은택', desc:'MX-402 CT 200/5 변경, DCS Range 100 -> 200 변경'},
  {id:'u2-11', region:'U-2', no:11, type:'자체', person:'손은택', desc:'BL-006 ON/OFF LAMP 접점 불량 확인.'},
  {id:'u2-12', region:'U-2', no:12, type:'자체', person:'진상현', desc:'MX-402 DE GREASE NIPPLE 점검.'},
  {id:'u2-13', region:'U-2', no:13, type:'외주', person:'손은택', desc:'FN-310 SIZE UP PNL\' 교체 및 MOTOR 교체(사전 Cable 포설 및 배관작업 필요) FN-310 관련 PNL 교체 공사'},
  {id:'u2-14', region:'U-2', no:14, type:'자체', person:'진상현', desc:'ML-250A/B-1 단자대 설치 작업'},
  {id:'u2-15', region:'U-2', no:15, type:'자체', person:'진상현', desc:'DR-500, 502 Cooling fan Cleaning'},
  {id:'u2-16', region:'U-2', no:16, type:'자체', person:'진상현', desc:'BL-002, 004, 006 Cooling fan Cleaning'},
  {id:'u2-17', region:'U-2', no:17, type:'자체', person:'진상현', desc:'BL-004 VT-004B 결선 (SENSOR CABLE 철거)'},
  {id:'u5-1', region:'U-5', no:1, type:'외주', person:'진상현', desc:'Motor 수리'},
  {id:'u5-2', region:'U-5', no:2, type:'자체', person:'손은택', desc:'Motor 절연저항 Check.'},
  {id:'u5-3', region:'U-5', no:3, type:'자체', person:'이인교', desc:'MCC eACM-3901 & FN-3901 Main 전원 분리 (동시 꺼짐 현상)'},
];

function loadTasks(){
  try{ const s=localStorage.getItem('tasks_v2'); if(s) return JSON.parse(s); }catch(e){}
  return DEFAULT_TASKS.map(t=>({...t}));
}
function saveTasks(){ localStorage.setItem('tasks_v2', JSON.stringify(tasks)); }
function loadDone(){
  try{ const s=localStorage.getItem('done_v2'); if(s) return JSON.parse(s); }catch(e){}
  return {};
}
function saveDone(){ localStorage.setItem('done_v2', JSON.stringify(doneMap)); }

let tasks   = loadTasks();
let doneMap = loadDone();
let pendingDeleteId = null;

function regionOf(tab){ return {u13:'U-1,3',u2:'U-2',u5:'U-5'}[tab]; }

// ── 탭 ───────────────────────────────────────────────
let curTab='all';
function switchTab(tab){
  curTab=tab;
  document.querySelectorAll('.tab').forEach((el,i)=>
    el.classList.toggle('active',['all','u13','u2','u5'][i]===tab));
  document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
  renderSection(tab);
}

// ── 렌더 ─────────────────────────────────────────────
function renderSection(tab){ renderSummary(tab); renderProgress(tab); renderList(tab); }

function getList(tab){
  return tab==='all' ? tasks : tasks.filter(t=>t.region===regionOf(tab));
}

function renderSummary(tab){
  const el=document.getElementById('summary-'+tab); if(!el) return;
  const list=getList(tab);
  const done=list.filter(t=>doneMap[t.id]).length;
  el.innerHTML=`
    <div class="stat-card total"><div class="num">${list.length}</div><div class="lbl">전체</div></div>
    <div class="stat-card done"><div class="num">${done}</div><div class="lbl">완료</div></div>
    <div class="stat-card remain"><div class="num">${list.length-done}</div><div class="lbl">미완료</div></div>`;
}

function renderProgress(tab){
  const el=document.getElementById('progress-'+tab); if(!el) return;
  const list=getList(tab);
  const pct=list.length?Math.round(list.filter(t=>doneMap[t.id]).length/list.length*100):0;
  el.innerHTML=`
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="progress-label">${pct}% 완료</div>`;
}

function renderList(tab){
  const el=document.getElementById('list-'+tab); if(!el) return;
  const list=getList(tab);
  if(tab==='all'){
    const labels={'U-1,3':'U-1,3 (담당: 박병근)','U-2':'U-2 (담당: 장지훈)','U-5':'U-5'};
    el.innerHTML=['U-1,3','U-2','U-5'].map(r=>{
      const rList=list.filter(t=>t.region===r);
      if(!rList.length) return '';
      return `<div class="section-header">${labels[r]}</div>`+rList.map(t=>buildCard(t,tab)).join('');
    }).join('');
  } else {
    el.innerHTML=list.length
      ? list.map(t=>buildCard(t,tab)).join('')
      : '<div class="empty-msg">등록된 작업이 없습니다</div>';
  }
}

function buildCard(t,tab){
  const uid=tab+'__'+t.id;
  const done=!!doneMap[t.id];
  const isOut=t.type==='외주';
  return `
<div class="task-card ${done?'completed':''} ${isOut&&!done?'outsource':''}" id="card-${uid}">
  <div class="task-row">
    <div class="task-no">${t.no}</div>
    <div class="task-info">
      <div class="task-desc ${done?'done-text':''}">${t.desc}</div>
      <div class="task-meta">
        <span class="tag ${isOut?'out':'self'}">${t.type}</span>
        <span class="tag person">👤 ${t.person}</span>
        ${done?'<span class="tag done-tag">✅ 완료</span>':''}
      </div>
    </div>
    <div class="task-actions">
      <button class="del-btn" onclick="confirmDelete('${t.id}')">✕</button>
      <button class="check-btn ${done?'checked':''}" onclick="toggleDone('${uid}','${t.id}')">✓</button>
    </div>
  </div>
</div>`;
}

// ── 완료 토글 ────────────────────────────────────────
function toggleDone(uid,tid){
  doneMap[tid]=!doneMap[tid];
  saveDone();
  showToast(doneMap[tid]?'✅ 완료 처리되었습니다':'↩ 완료 취소되었습니다');
  refreshAll();
}

// ── 작업 추가 ────────────────────────────────────────
function openModal(){
  if(curTab!=='all') document.getElementById('inp-region').value=regionOf(curTab);
  document.getElementById('inp-desc').value='';
  document.getElementById('inp-type').value='자체';
  document.getElementById('inp-person').value='';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('inp-desc').focus(),350);
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e){ if(e.target===document.getElementById('modalOverlay')) closeModal(); }

function addTask(){
  const region=document.getElementById('inp-region').value;
  const desc  =document.getElementById('inp-desc').value.trim();
  const type  =document.getElementById('inp-type').value;
  const person=document.getElementById('inp-person').value.trim();
  if(!desc){ showToast('⚠️ 작업 내용을 입력하세요'); return; }
  if(!person){ showToast('⚠️ 담당자를 입력하세요'); return; }
  const regionTasks=tasks.filter(t=>t.region===region);
  const maxNo=regionTasks.length?Math.max(...regionTasks.map(t=>t.no)):0;
  tasks.push({id:'c'+Date.now(), region, type, person, desc, no:maxNo+1});
  saveTasks();
  closeModal();
  showToast('➕ 작업이 추가되었습니다');
  refreshAll();
}

// ── 작업 삭제 ────────────────────────────────────────
function confirmDelete(tid){
  const t=tasks.find(x=>x.id===tid); if(!t) return;
  pendingDeleteId=tid;
  document.getElementById('confirmDesc').textContent=t.desc.length>50?t.desc.slice(0,50)+'…':t.desc;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm(){ pendingDeleteId=null; document.getElementById('confirmOverlay').classList.remove('open'); }
function doDelete(){
  if(!pendingDeleteId) return;
  const delTask=tasks.find(t=>t.id===pendingDeleteId);
  tasks=tasks.filter(t=>t.id!==pendingDeleteId);
  delete doneMap[pendingDeleteId];
  // 해당 구역 번호 재정렬
  if(delTask){
    let i=1; tasks.filter(t=>t.region===delTask.region).forEach(t=>{ t.no=i++; });
  }
  saveTasks(); saveDone();
  closeConfirm();
  showToast('🗑️ 작업이 삭제되었습니다');
  refreshAll();
}

// ── 전체 갱신 ────────────────────────────────────────
function refreshAll(){
  ['all','u13','u2','u5'].forEach(tab=>{
    renderSummary(tab); renderProgress(tab);
    if(tab===curTab) renderList(tab);
  });
}

// ── 토스트 ───────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

renderSection('all');
</script>
</body>
</html>
