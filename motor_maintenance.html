<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>전동기 정기보수 관리</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3450;
    --accent:#3d6fff; --red:#ff4d6d; --green:#06d6a0;
    --text:#e8eaf6; --text2:#8b92b8; --text3:#555e8a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

  .header{background:linear-gradient(135deg,#1a1d27,#22263a);border-bottom:1px solid var(--border);padding:16px;position:sticky;top:0;z-index:100}
  .header h1{font-size:18px;font-weight:700;letter-spacing:-0.3px}
  .header p{font-size:11px;color:var(--text2);margin-top:2px}

  .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:65px;z-index:99}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:1;min-width:80px;padding:12px 8px;text-align:center;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(61,111,255,.07)}

  .summary{display:flex;gap:8px;padding:12px 12px 0;overflow-x:auto;scrollbar-width:none}
  .summary::-webkit-scrollbar{display:none}
  .stat-card{flex:1;min-width:90px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
  .stat-card .num{font-size:22px;font-weight:900}
  .stat-card .lbl{font-size:10px;color:var(--text2);margin-top:2px}
  .stat-card.total .num{color:var(--accent)}
  .stat-card.out .num{color:var(--red)}
  .stat-card.in .num{color:var(--green)}

  .controls{padding:10px 12px}
  .search-box{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
  .search-box:focus{border-color:var(--accent)}
  .search-box::placeholder{color:var(--text3)}

  .motor-list{padding:0 12px 80px}
  .motor-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
  .motor-card.exported{border-left:3px solid var(--red)}
  .motor-card.imported{border-left:3px solid var(--green)}

  .motor-header{display:flex;align-items:center;padding:12px;gap:10px;cursor:pointer;user-select:none}
  .motor-name{font-size:14px;font-weight:700;letter-spacing:.3px}
  .region-label{font-size:10px;color:var(--text3);font-weight:500;margin-top:2px}
  .badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.5px;white-space:nowrap;flex-shrink:0}
  .badge.out{background:rgba(255,77,109,.15);color:var(--red);border:1px solid rgba(255,77,109,.3)}
  .badge.in{background:rgba(6,214,160,.15);color:var(--green);border:1px solid rgba(6,214,160,.3)}
  .badge.none{background:rgba(139,146,184,.1);color:var(--text2);border:1px solid var(--border)}

  .motor-body{padding:0 12px 12px;border-top:1px solid var(--border);display:none}
  .motor-body.open{display:block}

  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
  .info-item label{font-size:10px;color:var(--text3);display:block;margin-bottom:3px}
  .info-item input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 9px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
  .info-item input:focus{border-color:var(--accent)}

  .action-row{display:flex;gap:8px;margin-top:10px}
  .btn{flex:1;padding:9px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
  .btn-out{background:rgba(255,77,109,.15);color:var(--red);border:1px solid rgba(255,77,109,.3)}
  .btn-out:active{background:rgba(255,77,109,.3)}
  .btn-in{background:rgba(6,214,160,.15);color:var(--green);border:1px solid rgba(6,214,160,.3)}
  .btn-in:active{background:rgba(6,214,160,.3)}
  .btn-save{background:rgba(61,111,255,.15);color:var(--accent);border:1px solid rgba(61,111,255,.3)}
  .btn-save:active{background:rgba(61,111,255,.3)}
  .btn-reset{background:rgba(139,146,184,.1);color:var(--text2);border:1px solid var(--border)}

  .status-info{margin-top:8px;font-size:11px;color:var(--text2);padding:6px 8px;background:var(--surface2);border-radius:6px}
  .status-info span.red{color:var(--red)}
  .status-info span.green{color:var(--green)}

  .history-section{padding:12px}
  .date-picker-row{display:flex;gap:8px;align-items:center;margin-bottom:12px}
  .date-picker-row label{font-size:12px;color:var(--text2);white-space:nowrap}
  .date-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
  .date-input:focus{border-color:var(--accent)}

  .history-group{margin-bottom:16px}
  .history-group-title{font-size:11px;font-weight:700;letter-spacing:1px;padding:6px 10px;border-radius:6px;margin-bottom:6px}
  .history-group-title.out-title{background:rgba(255,77,109,.1);color:var(--red)}
  .history-group-title.in-title{background:rgba(6,214,160,.1);color:var(--green)}

  .history-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
  .history-item-name{font-size:13px;font-weight:700}
  .history-item-meta{font-size:11px;color:var(--text2);margin-top:2px}
  .history-item-time{font-size:11px;color:var(--text3)}

  .empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
  .empty-state .icon{font-size:40px;margin-bottom:10px}
  .empty-state p{font-size:13px}

  .section{display:none}
  .section.active{display:block}

  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:10px 20px;font-size:12px;color:var(--text);opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <h1>⚙️ 전동기 정기보수 관리</h1>
  <p>U-1,3 · U-2 · U-5 구역</p>
</div>

<div class="tabs">
  <div class="tab active"  onclick="switchTab('all')">전체</div>
  <div class="tab"         onclick="switchTab('u13')">U-1,3</div>
  <div class="tab"         onclick="switchTab('u2')">U-2</div>
  <div class="tab"         onclick="switchTab('u5')">U-5</div>
  <div class="tab"         onclick="switchTab('history')">반출입 이력</div>
</div>

<div id="sec-all" class="section active">
  <div class="summary" id="summary-all"></div>
  <div class="controls"><input class="search-box" type="text" placeholder="🔍 전동기 검색..." oninput="filterMotors('all',this.value)"></div>
  <div class="motor-list" id="list-all"></div>
</div>
<div id="sec-u13" class="section">
  <div class="summary" id="summary-u13"></div>
  <div class="controls"><input class="search-box" type="text" placeholder="🔍 전동기 검색..." oninput="filterMotors('u13',this.value)"></div>
  <div class="motor-list" id="list-u13"></div>
</div>
<div id="sec-u2" class="section">
  <div class="summary" id="summary-u2"></div>
  <div class="controls"><input class="search-box" type="text" placeholder="🔍 전동기 검색..." oninput="filterMotors('u2',this.value)"></div>
  <div class="motor-list" id="list-u2"></div>
</div>
<div id="sec-u5" class="section">
  <div class="summary" id="summary-u5"></div>
  <div class="controls"><input class="search-box" type="text" placeholder="🔍 전동기 검색..." oninput="filterMotors('u5',this.value)"></div>
  <div class="motor-list" id="list-u5"></div>
</div>
<div id="sec-history" class="section">
  <div class="history-section">
    <div class="date-picker-row">
      <label>날짜 선택</label>
      <input type="date" class="date-input" id="historyDate" onchange="renderHistory()">
    </div>
    <div id="historyContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

function loadData() {
  try { const s = localStorage.getItem('motorData_v3'); if (s) return JSON.parse(s); } catch(e){}
  return INITIAL_MOTORS.map(m => ({...m, status:'none', exportDate:'', importDate:''}));
}
function saveData() { localStorage.setItem('motorData_v3', JSON.stringify(motors)); }
function loadHist() {
  try { const s = localStorage.getItem('motorHist_v3'); if (s) return JSON.parse(s); } catch(e){}
  return [];
}
function saveHist() { localStorage.setItem('motorHist_v3', JSON.stringify(mHist)); }

let motors = loadData();
let mHist  = loadHist();

function today() { return new Date().toISOString().split('T')[0]; }
function nowTime(){ return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }
function regionOf(tab){ return {u13:'U-1,3',u2:'U-2',u5:'U-5'}[tab]; }

// ── 탭 전환 ───────────────────────────────────────────
let curTab = 'all';
function switchTab(tab) {
  curTab = tab;
  document.querySelectorAll('.tab').forEach((el,i) =>
    el.classList.toggle('active', ['all','u13','u2','u5','history'][i] === tab));
  document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
  if (tab === 'history') {
    if (!document.getElementById('historyDate').value)
      document.getElementById('historyDate').value = today();
    renderHistory();
  }
  // 탭 전환할 때마다 해당 섹션 새로 그림 → 항상 최신 데이터 반영
  else { renderSection(tab); }
}

// ── 렌더 ──────────────────────────────────────────────
function renderSection(tab){ renderSummary(tab); renderList(tab,''); }

function renderSummary(tab){
  const el = document.getElementById('summary-'+tab);
  if (!el) return;
  const list = tab==='all' ? motors : motors.filter(m=>m.region===regionOf(tab));
  el.innerHTML = `
    <div class="stat-card total"><div class="num">${list.length}</div><div class="lbl">전체</div></div>
    <div class="stat-card out"><div class="num">${list.filter(m=>m.status==='exported').length}</div><div class="lbl">반출중</div></div>
    <div class="stat-card in"><div class="num">${list.filter(m=>m.status==='imported').length}</div><div class="lbl">수리완료</div></div>`;
}

function filterMotors(tab,q){ renderList(tab,q); }

function renderList(tab,query){
  const el = document.getElementById('list-'+tab);
  if (!el) return;
  let list = tab==='all' ? [...motors] : motors.filter(m=>m.region===regionOf(tab));
  list.sort((a,b)=>a.name.localeCompare(b.name));
  if (query){
    const q=query.toLowerCase();
    list=list.filter(m=>m.name.toLowerCase().includes(q)||(m.location||'').toLowerCase().includes(q));
  }
  if (!list.length){
    el.innerHTML='<div class="empty-state"><div class="icon">🔍</div><p>검색 결과가 없습니다</p></div>';
    return;
  }
  // ★ 핵심: 카드 id에 탭명을 접두어로 붙여 탭마다 완전히 다른 id 생성
  el.innerHTML = list.map(m => buildCard(m, tab)).join('');
}

// uid = "탭명__motorId"  → 탭마다 절대 겹치지 않음
function buildCard(m, tab){
  const uid  = tab+'__'+m.id;
  const cls  = m.status==='exported'?'exported':m.status==='imported'?'imported':'';
  const bCls = m.status==='exported'?'out':m.status==='imported'?'in':'none';
  const bTxt = m.status==='exported'?'반출':m.status==='imported'?'수리완료':'정상';
  let si='';
  if (m.status==='exported'&&m.exportDate)
    si=`<div class="status-info">반출일: <span class="red">${m.exportDate}</span></div>`;
  else if (m.status==='imported'&&m.importDate)
    si=`<div class="status-info">반입일: <span class="green">${m.importDate}</span> · 수리완료</div>`;
  return `
<div class="motor-card ${cls}" id="card-${uid}">
  <div class="motor-header" onclick="toggleCard('${uid}')">
    <div style="flex:1;min-width:0">
      <div class="motor-name">${m.name}</div>
      <div class="region-label">${m.region}${m.kw?' · '+m.kw+'kW':''}${m.location?' · '+m.location:''}</div>
    </div>
    <span class="badge ${bCls}">${bTxt}</span>
  </div>
  <div class="motor-body" id="body-${uid}">
    <div class="info-grid">
      <div class="info-item"><label>용량 (kW)</label>
        <input type="text" id="kw-${uid}" value="${m.kw}" placeholder="kW 입력"></div>
      <div class="info-item"><label>위치</label>
        <input type="text" id="loc-${uid}" value="${m.location}" placeholder="위치 입력"></div>
    </div>
    ${si}
    <div class="action-row">
      <button class="btn btn-out"   onclick="setStatus('${uid}','exported')">📤 반출</button>
      <button class="btn btn-in"    onclick="setStatus('${uid}','imported')">📥 반입</button>
      <button class="btn btn-save"  onclick="saveMotor('${uid}')">💾 저장</button>
      <button class="btn btn-reset" onclick="setStatus('${uid}','none')">↩</button>
    </div>
  </div>
</div>`;
}

// uid → {tab, mid} 분리
function parseUid(uid){ const i=uid.indexOf('__'); return {tab:uid.slice(0,i), mid:uid.slice(i+2)}; }

function toggleCard(uid){
  const b=document.getElementById('body-'+uid);
  if(b) b.classList.toggle('open');
}

function saveMotor(uid){
  const {mid}=parseUid(uid);
  const m=motors.find(x=>x.id===mid); if(!m) return;
  m.kw      = document.getElementById('kw-'+uid).value;
  m.location= document.getElementById('loc-'+uid).value;
  saveData();
  showToast('✅ 저장되었습니다');
  refreshCard(uid);
}

function setStatus(uid, status){
  const {mid}=parseUid(uid);
  const m=motors.find(x=>x.id===mid); if(!m) return;
  if(status==='exported'){
    if(m.status==='exported'){showToast('이미 반출된 전동기입니다');return;}
    m.status='exported'; m.exportDate=today(); m.importDate='';
    mHist.push({id:mid,name:m.name,region:m.region,kw:m.kw,location:m.location,action:'exported',date:today(),time:nowTime()});
    showToast('📤 반출 처리되었습니다');
  } else if(status==='imported'){
    if(m.status==='imported'){showToast('이미 수리완료된 전동기입니다');return;}
    m.status='imported'; m.importDate=today();
    mHist.push({id:mid,name:m.name,region:m.region,kw:m.kw,location:m.location,action:'imported',date:today(),time:nowTime()});
    showToast('📥 반입(수리완료) 처리되었습니다');
  } else {
    m.status='none'; m.exportDate=''; m.importDate='';
    showToast('↩ 초기화되었습니다');
  }
  saveData(); saveHist();
  refreshCard(uid);
}

// 해당 카드를 현재 탭에서 교체 + 모든 탭 요약 갱신
function refreshCard(uid){
  const {tab, mid}=parseUid(uid);
  const m=motors.find(x=>x.id===mid); if(!m) return;

  // 현재 탭 카드 교체
  const card=document.getElementById('card-'+uid);
  if(card){
    const wasOpen=document.getElementById('body-'+uid)?.classList.contains('open');
    const dummy=document.createElement('div');
    dummy.innerHTML=buildCard(m,tab);
    card.replaceWith(dummy.firstElementChild);
    if(wasOpen) document.getElementById('body-'+uid)?.classList.add('open');
  }
  // 모든 탭 요약 숫자 갱신
  ['all','u13','u2','u5'].forEach(t=>renderSummary(t));
}

// ── 이력 ──────────────────────────────────────────────
function renderHistory(){
  const date=document.getElementById('historyDate').value;
  const el=document.getElementById('historyContent');
  if(!date) return;
  const day=mHist.filter(h=>h.date===date);
  const outs=day.filter(h=>h.action==='exported');
  const ins =day.filter(h=>h.action==='imported');
  if(!day.length){
    el.innerHTML=`<div class="empty-state"><div class="icon">📋</div><p>${date}<br>반출·반입 이력이 없습니다</p></div>`;
    return;
  }
  const row=h=>`
    <div class="history-item">
      <div>
        <div class="history-item-name">${h.name}</div>
        <div class="history-item-meta">${h.region}${h.kw?' · '+h.kw+'kW':''}${h.location?' · '+h.location:''}</div>
      </div>
      <div class="history-item-time">${h.time||''}</div>
    </div>`;
  let html='';
  if(outs.length) html+=`<div class="history-group"><div class="history-group-title out-title">📤 반출 (${outs.length}건)</div>${outs.map(row).join('')}</div>`;
  if(ins.length)  html+=`<div class="history-group"><div class="history-group-title in-title">📥 반입·수리완료 (${ins.length}건)</div>${ins.map(row).join('')}</div>`;
  el.innerHTML=html;
}

// ── 토스트 ────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ── 초기화 ────────────────────────────────────────────
// 전체 탭만 미리 그리고, 나머지는 탭 전환 시 그림
// → id 중복 완전 방지 (각 탭 list는 탭 전환 전까지 비어있음)
renderSection('all');
</script>
